name: $(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

resources:
  repositories:
    - repository: templates
      type: github
      name: microsoft/vscode-engineering
      ref: main
      endpoint: Monaco
    - repository: capi
      type: github
      name: microsoft/vscode-capi
      ref: main
      endpoint: Monaco

parameters:
  - name: customNPMRegistry
    displayName: Custom NPM Registry (Terrapin)
    type: boolean
    default: true
  - name: publishExtension
    displayName: Publish Stable Recovery Extension
    type: boolean
    default: false

variables:
  - name: VSCODE_QUALITY
    value: stable
  # The 1ES extension template configures the NPM registry itself (via the
  # customNPMRegistry / Terrapin parameter below). Set NPM_REGISTRY to 'none'
  # so the shared copilot/setup-steps.yml skips its own registry rewrite, which
  # would otherwise corrupt package-lock.json resolved URLs when unset.
  - name: NPM_REGISTRY
    value: none

extends:
  template: azure-pipelines/extension/stable.yml@templates
  parameters:
    workingDirectory: ./extensions/copilot
    l10nSourcePaths: ./extensions/copilot/src
    nodeVersion: 22.21.x

    cgIgnoreDirectories: $(Build.SourcesDirectory)/extensions/copilot/script

    # Suppress false positive strings SG.default.* that show up in
    # dist/extension.js after the build. The original strings come from ora.
    vscePackageArgs: '--allow-package-secrets sendgrid'

    buildSteps:
      - ${{ if eq(parameters.publishExtension, true) }}:
        - ${{ if not(startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')) }}:
          - script: |
              echo "##vso[task.logissue type=error]publishExtension requires a release/* branch"
              exit 1
            displayName: Validate release branch

      - template: copilot/setup-steps.yml
      - template: copilot/build-steps.yml
      - script: |
          set -e

          # The GLIBC check (from the shared extension template) scans every .node
          # under $PWD. @github/copilot vendors @picovoice/pvrecorder-node, whose
          # linux/x86_64 prebuild depends on GLIBC > 2.28. The native is not
          # shipped in the VSIX, so just remove the pvrecorder prebuilds before
          # the check runs.
          find "$(Build.SourcesDirectory)" \
            -type d -name pvrecorder-node \
            -path "*@picovoice/pvrecorder-node" \
            -print -exec rm -rf {} +
        displayName: Remove pvrecorder native binaries before GLIBC check

    uploadSourceMaps:
      enabled: true

    testSteps:
      - checkout: self
        lfs: true
        retryCountOnTaskFailure: 3
      - template: copilot/setup-steps.yml
      - template: copilot/test-steps.yml

    tsa:
      config:
        areaPath: 'Visual Studio Code Copilot Extensions'
        serviceTreeID: '1788a767-5861-45fb-973b-c686b67c5541'
      enabled: true

    # The Copilot build steps check out microsoft/vscode-capi (via the Monaco
    # GitHub App instead of a PAT). Every checked-out repository must be declared
    # for the 1ES SDL source analysis, so re-declare the template defaults plus
    # capi here.
    sourceRepositoriesToScan:
      exclude:
        - repository: translations
        - repository: vscode-copilot-cache
        - repository: templates
        - repository: capi

    ${{ if eq(parameters.customNPMRegistry, false) }}:
      customNPMRegistry: ''

    generateNotice: true

    publishExtension: ${{ parameters.publishExtension }}
    ghCreateTag: ${{ parameters.publishExtension }}
    ghTagPrefix: 'copilot/'
    ghCreateRelease: false
