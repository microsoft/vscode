name: $(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

resources:
  repositories:
    - repository: templates
      type: github
      name: microsoft/vscode-engineering
      ref: main
      endpoint: Monaco

parameters:
  - name: customNPMRegistry
    displayName: Custom NPM Registry (Terrapin)
    type: boolean
    default: true
  - name: publishExtension
    displayName: Publish Stable Extension
    type: boolean
    default: false

extends:
  template: azure-pipelines/extension/stable.yml@templates
  parameters:
    l10nSourcePaths: ./extensions/copilot/src
    nodeVersion: 22.21.x

    cgIgnoreDirectories: $(Build.SourcesDirectory)/extensions/copilot/script

    # Suppress false positive strings SG.default.* that show up in
    # dist/extension.js after the build. The original strings come from ora.
    vscePackageArgs: '--allow-package-secrets sendgrid'

    buildSteps:
      - ${{ if and(eq(parameters.publishExtension, true), not(startsWith(variables['Build.SourceBranch'], 'refs/heads/release/'))) }}:
        - script: |
            echo "##vso[task.logissue type=error]publishExtension requires a release/* branch"
            exit 1
          displayName: Validate release branch

      - script: |
          set -e
          git submodule update --init extensions/copilot
        displayName: Initialize copilot submodule

      - template: copilot/setup-steps.yml
      - script: |
          set -e
          VERSION=$(node build/azure-pipelines/common/computeCopilotChatVersion.ts)
          echo "Computed Copilot Chat version: $VERSION"
          echo "##vso[task.setvariable variable=COPILOT_CHAT_VERSION]$VERSION"
        displayName: Compute Copilot Chat version
      - template: copilot/build-steps.yml

    uploadSourceMaps:
      enabled: true

    testSteps:
      - checkout: self
        lfs: true

      - script: |
          set -e
          git submodule update --init extensions/copilot
        displayName: Initialize copilot submodule

      - template: copilot/setup-steps.yml
      - template: copilot/test-steps.yml

    tsa:
      config:
        areaPath: 'Visual Studio Code Copilot Extensions'
        serviceTreeID: '1788a767-5861-45fb-973b-c686b67c5541'
      enabled: true

    ${{ if eq(parameters.customNPMRegistry, false) }}:
      customNPMRegistry: ''

    generateNotice: true

    publishExtension: ${{ parameters.publishExtension }}
    ghReleasePublishVSIX: true
