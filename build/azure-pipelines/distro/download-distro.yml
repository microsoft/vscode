steps:
  # Check out the private microsoft/vscode-distro repository using the agent's
  # GitHub App (Monaco) credentials. This avoids the need for a long-lived PAT.
  # The repository resource is declared in the top-level pipeline (resources.repositories)
  # and is checked out into .build/distro so that mixin-npm.ts / mixin-quality.ts can
  # consume it from there (`.build/distro/npm`, `.build/distro/mixin/<quality>`).
  - checkout: distro
    path: s/.build/distro
    fetchDepth: 0
    retryCountOnTaskFailure: 3
    displayName: Checkout microsoft/vscode-distro

  - pwsh: |
      $ErrorActionPreference = "Stop"
      $DistroVersion = (Get-Content -Path package.json -Raw | ConvertFrom-Json).distro
      Write-Host "Checking out distro commit $DistroVersion"
      git -C .build/distro checkout $DistroVersion
    displayName: Checkout distro commit

  - script: git lfs install --local
    displayName: Initialize Git LFS

  - script: git lfs pull
    displayName: Pull Git LFS objects
