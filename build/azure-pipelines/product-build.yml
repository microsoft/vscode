pr: none

schedules:
  - cron: "0 5 * * Mon-Fri"
    displayName: Mon-Fri at 5:00 UTC (build, publish, and release)
    branches:
      include:
        - main
  - cron: "0 11 * * Mon-Fri"
    displayName: Mon-Fri at 11:00 UTC (build, and publish)
    branches:
      include:
        - main
  - cron: "0 17 * * Mon-Fri"
    displayName: Mon-Fri at 17:00 UTC (build, publish, and release)
    branches:
      include:
        - main
  - cron: "0 23 * * Mon-Fri"
    displayName: Mon-Fri at 23:00 UTC (build, and publish)
    branches:
      include:
        - main

trigger:
  batch: true
  branches:
    include: ["main", "release/*"]

extends:
  template: product-build-template.yml
  parameters:
    VSCODE_RUN_TSA: false
    VSCODE_RUN_APISCAN: true
