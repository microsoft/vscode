parameters:
  - name: VSCODE_QUALITY
    displayName: Quality
    type: string
    default: insider
    values:
      - exploration
      - insider
      - stable
  - name: VSCODE_BUILD_TYPE
    displayName: Build Type
    type: string
    default: Product
    values:
      - Product
      - CI
  - name: NPM_REGISTRY
    displayName: "Custom NPM Registry"
    type: string
    default: 'https://pkgs.dev.azure.com/monacotools/Monaco/_packaging/vscode/npm/registry/'
  - name: CARGO_REGISTRY
    displayName: "Custom Cargo Registry"
    type: string
    default: 'sparse+https://pkgs.dev.azure.com/monacotools/Monaco/_packaging/vscode/Cargo/index/'
  - name: VSCODE_BUILD_WIN32
    displayName: "🎯 Windows x64"
    type: boolean
    default: true
  - name: VSCODE_BUILD_WIN32_ARM64
    displayName: "🎯 Windows arm64"
    type: boolean
    default: true
  - name: VSCODE_BUILD_LINUX
    displayName: "🎯 Linux x64"
    type: boolean
    default: true
  - name: VSCODE_BUILD_LINUX_SNAP
    displayName: "🎯 Linux x64 Snap"
    type: boolean
    default: true
  - name: VSCODE_BUILD_LINUX_ARM64
    displayName: "🎯 Linux arm64"
    type: boolean
    default: true
  - name: VSCODE_BUILD_LINUX_ARMHF
    displayName: "🎯 Linux armhf"
    type: boolean
    default: true
  - name: VSCODE_BUILD_ALPINE
    displayName: "🎯 Alpine x64"
    type: boolean
    default: true
  - name: VSCODE_BUILD_ALPINE_ARM64
    displayName: "🎯 Alpine arm64"
    type: boolean
    default: true
  - name: VSCODE_BUILD_MACOS
    displayName: "🎯 macOS x64"
    type: boolean
    default: true
  - name: VSCODE_BUILD_MACOS_ARM64
    displayName: "🎯 macOS arm64"
    type: boolean
    default: true
  - name: VSCODE_BUILD_MACOS_UNIVERSAL
    displayName: "🎯 macOS universal"
    type: boolean
    default: true
  - name: VSCODE_BUILD_WEB
    displayName: "🎯 Web"
    type: boolean
    default: true
  - name: VSCODE_PUBLISH
    displayName: "Publish to builds.code.visualstudio.com"
    type: boolean
    default: true
  - name: VSCODE_RELEASE
    displayName: "Release build if successful"
    type: boolean
    default: false
  - name: VSCODE_STEP_ON_IT
    displayName: "Skip tests"
    type: boolean
    default: false
  - name: VSCODE_USE_LEGACY_OSS_NOTICE
    displayName: "Use legacy OSS Notice"
    type: boolean
    default: false
  - name: VSCODE_RUN_APISCAN
    type: boolean
    default: true

stages:

      - stage: Quality
        dependsOn: []
        pool:
          name: 1es-ubuntu-22.04-x64
          os: linux
        jobs:
          - template: product-quality-checks.yml@self

      - stage: Copilot
        dependsOn: []
        pool:
          name: 1es-ubuntu-22.04-x64
          os: linux
        jobs:
          - template: product-copilot.yml@self
            parameters:
              VSCODE_PUBLISH: ${{ parameters.VSCODE_PUBLISH }}
              VSCODE_RELEASE: ${{ parameters.VSCODE_RELEASE }}

      - ${{ if eq(variables['VSCODE_BUILD_STAGE_WINDOWS'], true) }}:
        - stage: Windows
          dependsOn: []
          pool:
            name: 1es-windows-2022-x64
            os: windows
          jobs:
            - ${{ if eq(parameters.VSCODE_BUILD_WIN32, true) }}:
              - template: win32/product-build-win32-cli.yml@self
                parameters:
                  VSCODE_ARCH: x64
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}
                  VSCODE_CHECK_ONLY: ${{ variables.VSCODE_CIBUILD }}

            - ${{ if and(eq(variables['VSCODE_CIBUILD'], false), eq(parameters.VSCODE_BUILD_WIN32_ARM64, true)) }}:
              - template: win32/product-build-win32-cli.yml@self
                parameters:
                  VSCODE_ARCH: arm64
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}

            - ${{ if eq(variables['VSCODE_CIBUILD'], true) }}:
              - template: win32/product-build-win32-ci.yml@self
                parameters:
                  VSCODE_CIBUILD: ${{ variables.VSCODE_CIBUILD }}
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}
                  VSCODE_TEST_SUITE: Electron
              - template: win32/product-build-win32-ci.yml@self
                parameters:
                  VSCODE_CIBUILD: ${{ variables.VSCODE_CIBUILD }}
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}
                  VSCODE_TEST_SUITE: Browser
              - template: win32/product-build-win32-ci.yml@self
                parameters:
                  VSCODE_CIBUILD: ${{ variables.VSCODE_CIBUILD }}
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}
                  VSCODE_TEST_SUITE: Remote

            - ${{ if and(eq(variables['VSCODE_CIBUILD'], false), eq(parameters.VSCODE_BUILD_WIN32, true)) }}:
              - template: win32/product-build-win32.yml@self
                parameters:
                  VSCODE_ARCH: x64
                  VSCODE_CIBUILD: ${{ variables.VSCODE_CIBUILD }}
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}
                  VSCODE_RUN_ELECTRON_TESTS: ${{ eq(parameters.VSCODE_STEP_ON_IT, false) }}
                  VSCODE_RUN_BROWSER_TESTS: ${{ eq(parameters.VSCODE_STEP_ON_IT, false) }}
                  VSCODE_RUN_REMOTE_TESTS: ${{ eq(parameters.VSCODE_STEP_ON_IT, false) }}

            - ${{ if and(eq(variables['VSCODE_CIBUILD'], false), eq(parameters.VSCODE_BUILD_WIN32_ARM64, true)) }}:
              - template: win32/product-build-win32.yml@self
                parameters:
                  VSCODE_ARCH: arm64
                  VSCODE_CIBUILD: ${{ variables.VSCODE_CIBUILD }}
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}

      - ${{ if eq(variables['VSCODE_BUILD_STAGE_LINUX'], true) }}:
        - stage: Linux
          dependsOn: []
          pool:
            name: 1es-ubuntu-22.04-x64
            os: linux
          jobs:
            - ${{ if eq(parameters.VSCODE_BUILD_LINUX, true) }}:
              - template: linux/product-build-linux-cli.yml@self
                parameters:
                  VSCODE_ARCH: x64
                  VSCODE_CHECK_ONLY: ${{ variables.VSCODE_CIBUILD }}
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}

            - ${{ if and(eq(variables['VSCODE_CIBUILD'], false), eq(parameters.VSCODE_BUILD_LINUX_ARM64, true)) }}:
              - template: linux/product-build-linux-cli.yml@self
                parameters:
                  VSCODE_ARCH: arm64
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}

            - ${{ if and(eq(variables['VSCODE_CIBUILD'], false), eq(parameters.VSCODE_BUILD_LINUX_ARMHF, true)) }}:
              - template: linux/product-build-linux-cli.yml@self
                parameters:
                  VSCODE_ARCH: armhf
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}

            - ${{ if eq(variables['VSCODE_CIBUILD'], true) }}:
              - template: linux/product-build-linux-ci.yml@self
                parameters:
                  VSCODE_CIBUILD: ${{ variables.VSCODE_CIBUILD }}
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}
                  VSCODE_TEST_SUITE: Electron
              - template: linux/product-build-linux-ci.yml@self
                parameters:
                  VSCODE_CIBUILD: ${{ variables.VSCODE_CIBUILD }}
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}
                  VSCODE_TEST_SUITE: Browser
              - template: linux/product-build-linux-ci.yml@self
                parameters:
                  VSCODE_CIBUILD: ${{ variables.VSCODE_CIBUILD }}
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}
                  VSCODE_TEST_SUITE: Remote

            - ${{ if and(eq(variables['VSCODE_CIBUILD'], false), or(eq(parameters.VSCODE_BUILD_LINUX, true), eq(parameters.VSCODE_BUILD_LINUX_SNAP, true))) }}:
              - template: linux/product-build-linux.yml@self
                parameters:
                  NPM_ARCH: x64
                  VSCODE_ARCH: x64
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}
                  VSCODE_CIBUILD: ${{ variables.VSCODE_CIBUILD }}
                  VSCODE_RUN_ELECTRON_TESTS: ${{ eq(parameters.VSCODE_STEP_ON_IT, false) }}
                  VSCODE_RUN_BROWSER_TESTS: ${{ eq(parameters.VSCODE_STEP_ON_IT, false) }}
                  VSCODE_RUN_REMOTE_TESTS: ${{ eq(parameters.VSCODE_STEP_ON_IT, false) }}
                  VSCODE_BUILD_LINUX_SNAP: ${{ parameters.VSCODE_BUILD_LINUX_SNAP }}

            - ${{ if and(eq(variables['VSCODE_CIBUILD'], false), eq(parameters.VSCODE_BUILD_LINUX_ARMHF, true)) }}:
              - template: linux/product-build-linux.yml@self
                parameters:
                  NPM_ARCH: arm
                  VSCODE_ARCH: armhf
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}
                  VSCODE_CIBUILD: ${{ variables.VSCODE_CIBUILD }}

            - ${{ if and(eq(variables['VSCODE_CIBUILD'], false), eq(parameters.VSCODE_BUILD_LINUX_ARM64, true)) }}:
              - template: linux/product-build-linux.yml@self
                parameters:
                  NPM_ARCH: arm64
                  VSCODE_ARCH: arm64
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}
                  VSCODE_CIBUILD: ${{ variables.VSCODE_CIBUILD }}

      - ${{ if and(eq(variables['VSCODE_CIBUILD'], false), eq(variables['VSCODE_BUILD_STAGE_ALPINE'], true)) }}:
        - stage: Alpine
          dependsOn: []
          jobs:
            - ${{ if eq(parameters.VSCODE_BUILD_ALPINE, true) }}:
              - template: alpine/product-build-alpine.yml@self
                parameters:
                  VSCODE_ARCH: x64
              - template: alpine/product-build-alpine-cli.yml@self
                parameters:
                  VSCODE_ARCH: x64
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}
            - ${{ if eq(parameters.VSCODE_BUILD_ALPINE_ARM64, true) }}:
              - template: alpine/product-build-alpine.yml@self
                parameters:
                  VSCODE_ARCH: arm64
              - template: alpine/product-build-alpine-cli.yml@self
                parameters:
                  VSCODE_ARCH: arm64
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}

      - ${{ if eq(variables['VSCODE_BUILD_STAGE_MACOS'], true) }}:
        - stage: macOS
          dependsOn: []
          pool:
            name: AcesShared
            os: macOS
            demands:
              - ImageOverride -equals ACES_VM_SharedPool_Sequoia
          variables:
            BUILDSECMON_OPT_IN: true
          jobs:
            - ${{ if eq(parameters.VSCODE_BUILD_MACOS, true) }}:
              - template: darwin/product-build-darwin-cli.yml@self
                parameters:
                  VSCODE_ARCH: x64
                  VSCODE_CHECK_ONLY: ${{ variables.VSCODE_CIBUILD }}
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}

            - ${{ if and(eq(variables['VSCODE_CIBUILD'], false), eq(parameters.VSCODE_BUILD_MACOS_ARM64, true)) }}:
              - template: darwin/product-build-darwin-cli.yml@self
                parameters:
                  VSCODE_ARCH: arm64
                  VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}

            - ${{ if eq(variables['VSCODE_CIBUILD'], true) }}:
              - template: darwin/product-build-darwin-ci.yml@self
                parameters:
                  VSCODE_CIBUILD: ${{ variables.VSCODE_CIBUILD }}
                  VSCODE_TEST_SUITE: Electron
              - template: darwin/product-build-darwin-ci.yml@self
                parameters:
                  VSCODE_CIBUILD: ${{ variables.VSCODE_CIBUILD }}
                  VSCODE_TEST_SUITE: Browser
              - template: darwin/product-build-darwin-ci.yml@self
                parameters:
                  VSCODE_CIBUILD: ${{ variables.VSCODE_CIBUILD }}
                  VSCODE_TEST_SUITE: Remote

            - ${{ if and(eq(variables['VSCODE_CIBUILD'], false), eq(parameters.VSCODE_BUILD_MACOS, true)) }}:
              - template: darwin/product-build-darwin.yml@self
                parameters:
                  VSCODE_ARCH: x64
                  VSCODE_CIBUILD: ${{ variables.VSCODE_CIBUILD }}

            - ${{ if and(eq(variables['VSCODE_CIBUILD'], false), eq(parameters.VSCODE_BUILD_MACOS_ARM64, true)) }}:
              - template: darwin/product-build-darwin.yml@self
                parameters:
                  VSCODE_ARCH: arm64
                  VSCODE_CIBUILD: ${{ variables.VSCODE_CIBUILD }}
                  VSCODE_RUN_ELECTRON_TESTS: ${{ eq(parameters.VSCODE_STEP_ON_IT, false) }}
                  VSCODE_RUN_BROWSER_TESTS: ${{ eq(parameters.VSCODE_STEP_ON_IT, false) }}
                  VSCODE_RUN_REMOTE_TESTS: ${{ eq(parameters.VSCODE_STEP_ON_IT, false) }}

            - ${{ if and(eq(variables['VSCODE_CIBUILD'], false), eq(variables['VSCODE_BUILD_MACOS_UNIVERSAL'], true)) }}:
              - template: darwin/product-build-darwin-universal.yml@self

      - ${{ if and(eq(variables['VSCODE_CIBUILD'], false), eq(variables['VSCODE_BUILD_STAGE_WEB'], true)) }}:
        - stage: Web
          dependsOn: []
          jobs:
            - template: web/product-build-web.yml@self

      - ${{ if eq(variables['VSCODE_PUBLISH'], true) }}:
        - stage: Publish
          dependsOn: []
          jobs:
            - template: product-publish.yml@self
              parameters:
                VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}
                VSCODE_SCHEDULEDBUILD: ${{ variables.VSCODE_SCHEDULEDBUILD }}

      - ${{ if and(eq(variables['VSCODE_PUBLISH'], 'true'), eq(variables['VSCODE_STEP_ON_IT'], false)) }}:
        - stage: SanityTests
          displayName: Sanity Tests
          dependsOn:
            - Publish
          variables:
            - name: BUILD_COMMIT
              value: $(Build.SourceVersion)
            - name: BUILD_QUALITY
              value: ${{ variables.VSCODE_QUALITY }}
          jobs:
            # macOS
            - ${{ if eq(parameters.VSCODE_BUILD_MACOS, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: macos_x64
                  displayName: macOS x64 (no runtime)
                  poolName: AcesShared
                  os: macOS
                  args: --no-detection --grep "darwin-x64"

            - ${{ if eq(parameters.VSCODE_BUILD_MACOS_ARM64, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: macos_arm64
                  displayName: macOS arm64
                  poolName: AcesShared
                  os: macOS

            # Windows
            - ${{ if eq(parameters.VSCODE_BUILD_WIN32, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: windows_x64
                  displayName: Windows x64
                  poolName: 1es-windows-2022-x64
                  os: windows

            - ${{ if eq(parameters.VSCODE_BUILD_WIN32_ARM64, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: windows_arm64
                  displayName: Windows arm64
                  poolName: 1es-windows-2022-arm64
                  os: windows

            # Alpine 3.22
            - ${{ if eq(parameters.VSCODE_BUILD_ALPINE, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: alpine_amd64
                  displayName: Alpine 3.22 amd64
                  poolName: 1es-ubuntu-22.04-x64
                  container: alpine
                  arch: amd64

            - ${{ if eq(parameters.VSCODE_BUILD_ALPINE_ARM64, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: alpine_arm64
                  displayName: Alpine 3.22 arm64
                  poolName: 1es-azure-linux-3-arm64
                  container: alpine
                  arch: arm64

            # CentOS Stream 9
            - ${{ if eq(parameters.VSCODE_BUILD_LINUX, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: centos_stream9_amd64
                  displayName: CentOS Stream 9 amd64
                  poolName: 1es-ubuntu-22.04-x64
                  container: centos
                  arch: amd64

            - ${{ if eq(parameters.VSCODE_BUILD_LINUX_ARM64, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: centos_stream9_arm64
                  displayName: CentOS Stream 9 arm64
                  poolName: 1es-azure-linux-3-arm64
                  container: centos
                  arch: arm64

            # Debian 11
            - ${{ if eq(parameters.VSCODE_BUILD_LINUX, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: debian_11_amd64
                  displayName: Debian 11 amd64
                  poolName: 1es-ubuntu-22.04-x64
                  container: debian-11
                  arch: amd64

            - ${{ if eq(parameters.VSCODE_BUILD_LINUX_ARMHF, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: debian_11_arm32
                  displayName: Debian 11 arm32
                  poolName: 1es-azure-linux-3-arm64
                  container: debian-11
                  arch: arm

            - ${{ if eq(parameters.VSCODE_BUILD_LINUX_ARM64, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: debian_11_arm64
                  displayName: Debian 11 arm64
                  poolName: 1es-azure-linux-3-arm64
                  container: debian-11
                  arch: arm64

            # Debian 12
            - ${{ if eq(parameters.VSCODE_BUILD_LINUX, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: debian_12_amd64
                  displayName: Debian 12 amd64
                  poolName: 1es-ubuntu-22.04-x64
                  container: debian-12
                  arch: amd64

            - ${{ if eq(parameters.VSCODE_BUILD_LINUX_ARMHF, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: debian_12_arm32
                  displayName: Debian 12 arm32
                  poolName: 1es-azure-linux-3-arm64
                  container: debian-12
                  arch: arm

            - ${{ if eq(parameters.VSCODE_BUILD_LINUX_ARM64, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: debian_12_arm64
                  displayName: Debian 12 arm64
                  poolName: 1es-azure-linux-3-arm64
                  container: debian-12
                  arch: arm64

            # Fedora 42
            - ${{ if eq(parameters.VSCODE_BUILD_LINUX, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: fedora_42_amd64
                  displayName: Fedora 42 amd64
                  poolName: 1es-ubuntu-22.04-x64
                  container: fedora-42
                  arch: amd64

            - ${{ if eq(parameters.VSCODE_BUILD_LINUX_ARM64, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: fedora_42_arm64
                  displayName: Fedora 42 arm64
                  poolName: 1es-azure-linux-3-arm64
                  container: fedora-42
                  arch: arm64

            # Fedora 43
            - ${{ if eq(parameters.VSCODE_BUILD_LINUX, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: fedora_43_amd64
                  displayName: Fedora 43 amd64
                  poolName: 1es-ubuntu-22.04-x64
                  container: fedora-43
                  arch: amd64

            - ${{ if eq(parameters.VSCODE_BUILD_LINUX_ARM64, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: fedora_43_arm64
                  displayName: Fedora 43 arm64
                  poolName: 1es-azure-linux-3-arm64
                  container: fedora-43
                  arch: arm64

            # openSUSE Leap 16.0
            - ${{ if eq(parameters.VSCODE_BUILD_LINUX, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: opensuse_leap_amd64
                  displayName: openSUSE Leap 16.0 amd64
                  poolName: 1es-ubuntu-22.04-x64
                  container: opensuse
                  arch: amd64

            - ${{ if eq(parameters.VSCODE_BUILD_LINUX_ARM64, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: opensuse_leap_arm64
                  displayName: openSUSE Leap 16.0 arm64
                  poolName: 1es-azure-linux-3-arm64
                  container: opensuse
                  arch: arm64

            # Red Hat UBI 9
            - ${{ if eq(parameters.VSCODE_BUILD_LINUX, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: redhat_ubi9_amd64
                  displayName: Red Hat UBI 9 amd64
                  poolName: 1es-ubuntu-22.04-x64
                  container: redhat
                  arch: amd64

            - ${{ if eq(parameters.VSCODE_BUILD_LINUX_ARM64, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: redhat_ubi9_arm64
                  displayName: Red Hat UBI 9 arm64
                  poolName: 1es-azure-linux-3-arm64
                  container: redhat
                  arch: arm64

            # Ubuntu 22.04 Native (Snap coverage)
            - ${{ if eq(parameters.VSCODE_BUILD_LINUX, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: ubuntu_native_x64
                  displayName: Ubuntu 22.04 x64 Native
                  poolName: 1es-ubuntu-22.04-x64
                  os: linux

            # Ubuntu 22.04
            - ${{ if eq(parameters.VSCODE_BUILD_LINUX, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: ubuntu_22_04_amd64
                  displayName: Ubuntu 22.04 amd64
                  poolName: 1es-ubuntu-22.04-x64
                  container: ubuntu-22
                  arch: amd64

            - ${{ if eq(parameters.VSCODE_BUILD_LINUX_ARMHF, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: ubuntu_22_04_arm32
                  displayName: Ubuntu 22.04 arm32
                  poolName: 1es-azure-linux-3-arm64
                  container: ubuntu-22
                  arch: arm

            - ${{ if eq(parameters.VSCODE_BUILD_LINUX_ARM64, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: ubuntu_22_04_arm64
                  displayName: Ubuntu 22.04 arm64
                  poolName: 1es-azure-linux-3-arm64
                  container: ubuntu-22
                  arch: arm64

            # Ubuntu 24.04
            - ${{ if eq(parameters.VSCODE_BUILD_LINUX, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: ubuntu_24_04_amd64
                  displayName: Ubuntu 24.04 amd64
                  poolName: 1es-ubuntu-22.04-x64
                  container: ubuntu-24
                  arch: amd64

            - ${{ if eq(parameters.VSCODE_BUILD_LINUX_ARMHF, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: ubuntu_24_04_arm32
                  displayName: Ubuntu 24.04 arm32
                  poolName: 1es-azure-linux-3-arm64
                  container: ubuntu-24
                  arch: arm

            - ${{ if eq(parameters.VSCODE_BUILD_LINUX_ARM64, true) }}:
              - template: common/sanity-tests.yml@self
                parameters:
                  name: ubuntu_24_04_arm64
                  displayName: Ubuntu 24.04 arm64
                  poolName: 1es-azure-linux-3-arm64
                  container: ubuntu-24
                  arch: arm64

        - ${{ if and(parameters.VSCODE_RELEASE, eq(variables['VSCODE_PRIVATE_BUILD'], false), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/'))) }}:
          - stage: ApproveRelease
            dependsOn: [] # run in parallel to compile stage
            pool:
              name: 1es-ubuntu-22.04-x64
              os: linux
            jobs:
              - job: ApproveRelease
                displayName: "Approve Release"
                variables:
                  - group: VSCodePeerApproval
                  - name: skipComponentGovernanceDetection
                    value: true

          - stage: Release
            dependsOn:
              - Publish
              - ApproveRelease
            pool:
              name: 1es-ubuntu-22.04-x64
              os: linux
            jobs:
              - job: ReleaseBuild
                displayName: Release Build
                steps:
                  - template: product-release.yml@self
                    parameters:
                      VSCODE_RELEASE: ${{ parameters.VSCODE_RELEASE }}

      - ${{ if eq(variables['VSCODE_CIBUILD'], true) }}:
        - stage: node_modules
          dependsOn: []
          jobs:
            - template: win32/product-build-win32-node-modules.yml@self
              parameters:
                VSCODE_ARCH: arm64
            - template: linux/product-build-linux-node-modules.yml@self
              parameters:
                NPM_ARCH: arm64
                VSCODE_ARCH: arm64
            - template: linux/product-build-linux-node-modules.yml@self
              parameters:
                NPM_ARCH: arm
                VSCODE_ARCH: armhf
            - template: alpine/product-build-alpine-node-modules.yml@self
              parameters:
                VSCODE_ARCH: x64
            - template: alpine/product-build-alpine-node-modules.yml@self
              parameters:
                VSCODE_ARCH: arm64
            - template: darwin/product-build-darwin-node-modules.yml@self
              parameters:
                VSCODE_ARCH: x64
            - template: web/product-build-web-node-modules.yml@self

      - ${{ if and(eq(variables['VSCODE_CIBUILD'], false), eq(parameters.VSCODE_RUN_APISCAN, true)) }}:
        - stage: APIScan
          dependsOn: []
          pool:
            name: 1es-windows-2022-x64
            os: windows
          jobs:
            - job: WindowsAPIScan
              steps:
                - template: win32/sdl-scan-win32.yml@self
                  parameters:
                    VSCODE_ARCH: x64
                    VSCODE_QUALITY: ${{ variables.VSCODE_QUALITY }}
