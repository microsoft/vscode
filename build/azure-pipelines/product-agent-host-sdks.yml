parameters:
  - name: VSCODE_QUALITY
    type: string
  - name: VSCODE_PUBLISH
    type: boolean
    default: false
  - name: VSCODE_RELEASE
    type: boolean
    default: false

# Builds the per-platform agent host SDK bundles (Codex / Claude), verifies they
# match the version + sha256 pinned in product.json, and — on publishing builds —
# releases them to the PRSS download CDN via ESRP.
#
# This stage is OFF by default (gated by VSCODE_BUILD_AGENT_HOST_SDKS) because the
# pinned SDK versions change rarely; re-publishing an unchanged version is a no-op.
# See src/vs/platform/agentHost/AGENT_HOST_SDK_DELIVERY_PLAN.md.
jobs:
  - job: AgentHostSdks
    displayName: Agent Host SDKs
    timeoutInMinutes: 90
    variables:
      - name: skipComponentGovernanceDetection
        value: true
      - name: Codeql.SkipTaskAutoInjection
        value: true
    templateContext:
      outputParentDirectory: $(Build.ArtifactStagingDirectory)
      outputs:
        - output: pipelineArtifact
          targetPath: $(Build.ArtifactStagingDirectory)/agent-host-sdks
          artifactName: agent_host_sdks
          displayName: Publish agent host SDK bundles
          sbomEnabled: false
    steps:
      - template: ./common/checkout.yml@self

      - task: NodeTool@0
        inputs:
          versionSource: fromFile
          versionFilePath: .nvmrc

      - script: node build/setup-npm-registry.ts $NPM_REGISTRY
        condition: and(succeeded(), ne(variables['NPM_REGISTRY'], 'none'))
        displayName: Setup NPM Registry

      - script: |
          set -e
          # Set the private NPM registry in the global npmrc so the per-target
          # SDK fetches authenticate against the mirror.
          npm config set registry "$NPM_REGISTRY"
          echo "##vso[task.setvariable variable=NPMRC_PATH]$(npm config get userconfig)"
        condition: and(succeeded(), ne(variables['NPM_REGISTRY'], 'none'))
        displayName: Setup NPM

      - task: npmAuthenticate@0
        inputs:
          workingFile: $(NPMRC_PATH)
        condition: and(succeeded(), ne(variables['NPM_REGISTRY'], 'none'))
        displayName: Setup NPM Authentication

      - script: |
          set -e
          for i in {1..5}; do
            npm ci --ignore-scripts --omit=optional && break
            if [ $i -eq 5 ]; then echo "npm ci failed too many times" >&2; exit 1; fi
            echo "npm ci failed (attempt $i), retrying..."
          done
        displayName: Install build dependencies

      # Builds every per-target bundle into .build/agentHostSdks and HARD-FAILS if
      # the version or sha256 drifts from the product.json pin.
      - script: node build/npm/update-agent-host-sdks.ts --check
        displayName: Package and verify agent host SDK bundles

      - script: |
          set -e
          mkdir -p $(Build.ArtifactStagingDirectory)/agent-host-sdks
          cp .build/agentHostSdks/*.zip $(Build.ArtifactStagingDirectory)/agent-host-sdks/
        displayName: Stage SDK bundles for publishing

      - ${{ if or(eq(parameters.VSCODE_PUBLISH, true), eq(parameters.VSCODE_RELEASE, true)) }}:
        - task: AzureKeyVault@2
          displayName: "Azure Key Vault: Get ESRP Secrets"
          inputs:
            azureSubscription: vscode-esrp
            KeyVaultName: vscode-esrp
            SecretsFilter: esrp-auth,esrp-sign

        - task: AzureCLI@2
          displayName: Fetch secrets
          inputs:
            azureSubscription: vscode
            scriptType: bash
            scriptLocation: inlineScript
            addSpnToEnvironment: true
            inlineScript: |
              echo "##vso[task.setvariable variable=AZURE_TENANT_ID]$tenantId"
              echo "##vso[task.setvariable variable=AZURE_CLIENT_ID]$servicePrincipalId"
              echo "##vso[task.setvariable variable=AZURE_ID_TOKEN;issecret=true]$idToken"

        - script: |
            set -e
            PUBLISH_AUTH_TOKENS=$(node build/azure-pipelines/common/getPublishAuthTokens.ts)
            echo "##vso[task.setvariable variable=PUBLISH_AUTH_TOKENS;issecret=true]$PUBLISH_AUTH_TOKENS"
          env:
            AZURE_TENANT_ID: "$(AZURE_TENANT_ID)"
            AZURE_CLIENT_ID: "$(AZURE_CLIENT_ID)"
            AZURE_ID_TOKEN: "$(AZURE_ID_TOKEN)"
          displayName: Get publish auth tokens

        - script: node build/azure-pipelines/common/publish-agent-host-sdks.ts "$(Build.ArtifactStagingDirectory)/agent-host-sdks"
          env:
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)
            PUBLISH_AUTH_TOKENS: "$(PUBLISH_AUTH_TOKENS)"
            RELEASE_TENANT_ID: "$(ESRP_TENANT_ID)"
            RELEASE_CLIENT_ID: "$(ESRP_CLIENT_ID)"
            RELEASE_AUTH_CERT: "$(esrp-auth)"
            RELEASE_REQUEST_SIGNING_CERT: "$(esrp-sign)"
          displayName: Publish SDK bundles to CDN
          retryCountOnTaskFailure: 3
