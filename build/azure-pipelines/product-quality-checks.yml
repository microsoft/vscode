jobs:
  - job: Quality
    displayName: Quality Checks
    timeoutInMinutes: 20
    variables:
      - name: skipComponentGovernanceDetection
        value: true
      - name: Codeql.SkipTaskAutoInjection
        value: true
    steps:
      - template: ./common/checkout.yml@self

      - task: NodeTool@0
        inputs:
          versionSource: fromFile
          versionFilePath: .nvmrc

      - template: ./distro/download-distro.yml@self

      - task: AzureKeyVault@2
        displayName: "Azure Key Vault: Get Secrets"
        inputs:
          azureSubscription: vscode-oss-build-secrets
          KeyVaultName: vscode-oss-build-secrets
          SecretsFilter: "github-token-code-oss"

      - script: node build/setup-npm-registry.ts $NPM_REGISTRY
        condition: and(succeeded(), ne(variables['NPM_REGISTRY'], 'none'))
        displayName: Setup NPM Registry

      - script: mkdir -p .build && node build/azure-pipelines/common/computeNodeModulesCacheKey.ts quality $(node -p process.arch) > .build/packagelockhash
        displayName: Prepare node_modules cache key

      - task: Cache@2
        inputs:
          key: '"node_modules" | .build/packagelockhash'
          path: .build/node_modules_cache
          cacheHitVar: NODE_MODULES_RESTORED
        displayName: Restore node_modules cache

      - script: tar -xzf .build/node_modules_cache/cache.tgz
        condition: and(succeeded(), eq(variables.NODE_MODULES_RESTORED, 'true'))
        displayName: Extract node_modules cache

      - script: |
          set -e
          npm config set registry "$NPM_REGISTRY"
          echo "##vso[task.setvariable variable=NPMRC_PATH]$(npm config get userconfig)"
        condition: and(succeeded(), ne(variables.NODE_MODULES_RESTORED, 'true'), ne(variables['NPM_REGISTRY'], 'none'))
        displayName: Setup NPM

      - task: npmAuthenticate@0
        inputs:
          workingFile: $(NPMRC_PATH)
        condition: and(succeeded(), ne(variables.NODE_MODULES_RESTORED, 'true'), ne(variables['NPM_REGISTRY'], 'none'))
        displayName: Setup NPM Authentication

      - script: |
          set -e

          for i in {1..5}; do # try 5 times
            npm ci && break
            if [ $i -eq 5 ]; then
              echo "Npm install failed too many times" >&2
              exit 1
            fi
            echo "Npm install failed $i, trying again..."
          done
        workingDirectory: build
        env:
          GITHUB_TOKEN: "$(github-token-code-oss)"
        displayName: Install build dependencies
        condition: and(succeeded(), ne(variables.NODE_MODULES_RESTORED, 'true'))

      - script: |
          set -e
          export VSCODE_SYSROOT_DIR=$(Build.SourcesDirectory)/.build/sysroots/glibc-2.28-gcc-8.5.0
          SYSROOT_ARCH="amd64" VSCODE_SYSROOT_PREFIX="-glibc-2.28-gcc-8.5.0" node -e 'import { getVSCodeSysroot } from "./build/linux/debian/install-sysroot.ts"; (async () => { await getVSCodeSysroot(process.env["SYSROOT_ARCH"]); })()'
        env:
          VSCODE_ARCH: x64
          GITHUB_TOKEN: "$(github-token-code-oss)"
        displayName: Download vscode sysroots

      - script: |
          set -e

          source ./build/azure-pipelines/linux/setup-env.sh
          node build/npm/preinstall.ts

          for i in {1..5}; do # try 5 times
            npm ci && break
            if [ $i -eq 5 ]; then
              echo "Npm install failed too many times" >&2
              exit 1
            fi
            echo "Npm install failed $i, trying again..."
          done
        env:
          npm_config_arch: x64
          VSCODE_ARCH: x64
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: "$(github-token-code-oss)"
        displayName: Install dependencies
        condition: and(succeeded(), ne(variables.NODE_MODULES_RESTORED, 'true'))

      - script: node build/azure-pipelines/distro/mixin-npm.ts
        condition: and(succeeded(), ne(variables.NODE_MODULES_RESTORED, 'true'))
        displayName: Mixin distro node modules

      - script: |
          set -e
          node build/azure-pipelines/common/listNodeModules.ts .build/node_modules_list.txt
          mkdir -p .build/node_modules_cache
          tar -czf .build/node_modules_cache/cache.tgz --files-from .build/node_modules_list.txt
        condition: and(succeeded(), ne(variables.NODE_MODULES_RESTORED, 'true'))
        displayName: Create node_modules archive

      - script: node build/azure-pipelines/distro/mixin-quality.ts
        displayName: Mixin distro quality

      - script: node build/azure-pipelines/common/checkDistroCommit.ts
        displayName: Check distro commit
        env:
          BUILD_SOURCEBRANCH: "$(Build.SourceBranch)"
        continueOnError: true
        condition: and(succeeded(), eq(lower(variables['VSCODE_PUBLISH']), 'true'))

      - template: ./common/mixin-vscode-capi.yml@self

      - script: npm exec -- npm-run-all2 -lp core-ci hygiene eslint valid-layers-check define-class-fields-check vscode-dts-compile-check tsec-compile-check test-build-scripts
        env:
          GITHUB_TOKEN: "$(github-token-code-oss)"
        displayName: Compile & Hygiene

      - script: npm run download-builtin-extensions-cg
        displayName: Download component details of built-in extensions
        continueOnError: true

      - task: ms.vss-governance-buildtask.governance-build-task-component-detection.ComponentGovernanceComponentDetection@0
        displayName: "Component Detection"
        inputs:
          sourceScanPath: $(Build.SourcesDirectory)
          alertWarningLevel: Medium
        continueOnError: true

      - task: notice@0
        displayName: "Generate ThirdPartyNotices (CG)"
        inputs:
          outputfile: $(Build.SourcesDirectory)/ThirdPartyNotices.generated.txt
        retryCountOnTaskFailure: 3
        continueOnError: true

      # =========================================================================
      # Cached-NOTICE fallback
      #
      # Goal: never ship without *some* CG NOTICE. If `notice@0` above fails or
      # produces an empty file (CG service down, timeout, etc.), substitute the
      # most recent successfully-generated `ThirdPartyNotices.generated.txt`
      # from a prior build.
      #
      # Fallback order:
      #   1. Most recent run on the CURRENT branch
      #   2. Most recent run on `main`
      #
      # Carry-forward: the cache download reads only the SINGLE latest build, so a
      # sustained CG outage (>1 build) breaks the chain unless every build keeps a
      # copy. The "Upload CG NOTICE artifact" step below runs on the fallback path
      # too, handing the last-good NOTICE forward. Ref: builds 450982->451029.
      #
      # TODO: consider enforcing a max-age check (~30 days) on cached NOTICEs.
      # Today the only signal is the warning emitted below.
      #
      # Architecture note: the fallback ONLY substitutes the CG-supplied portion.
      # The local steps (scan-licenses, merge-notices, apply-overrides) ALWAYS
      # run fresh against current HEAD, so extension licenses and
      # cglicenses.json overrides are always current-PR-accurate.
      # =========================================================================

      # Detect up front whether CG produced a usable NOTICE. The cache-download
      # tasks below run ONLY when it did not -- otherwise they execute on the
      # happy path and, when no prior cache artifact exists (e.g. the first build
      # on a branch), fail-with-continueOnError and mark the whole build
      # partiallySucceeded for no real reason. Uses the same >1KB heuristic as
      # the "apply NOTICE fallback" step below so the two always agree.
      - script: |
          set -u
          GEN="$(Build.SourcesDirectory)/ThirdPartyNotices.generated.txt"
          if [ -f "$GEN" ] && [ "$(wc -c < "$GEN")" -gt 1024 ]; then
            echo "##[section]CG NOTICE generation succeeded; skipping cache download."
            echo "##vso[task.setvariable variable=CG_NOTICE_OK]true"
          else
            echo "##[warning]CG NOTICE generation failed or produced empty output; will attempt cache fallback."
            echo "##vso[task.setvariable variable=CG_NOTICE_OK]false"
          fi
        displayName: "Cache: detect whether CG NOTICE needs fallback"
        continueOnError: true

      - task: DownloadBuildArtifacts@1
        displayName: "Cache: download last good NOTICE (same branch)"
        inputs:
          buildType: specific
          project: $(System.TeamProject)
          definition: $(System.DefinitionId)
          buildVersionToDownload: latestFromBranch
          branchName: $(Build.SourceBranch)
          allowPartiallySucceededBuilds: true
          artifactName: notice_output
          # NB: one glob per line. DownloadBuildArtifacts@1 runs minimatch with
          # brace expansion disabled, so a "**/{a,b}" pattern matches NOTHING and
          # silently downloads 0 files (observed in build 450982, the first real
          # CG outage post-cutover: the artifact downloaded but every file was
          # excluded, so the apply-fallback step saw no cache). Multi-line plain
          # globs are matched reliably.
          itemPattern: |
            **/ThirdPartyNotices.generated.txt
            **/notice-meta.txt
          downloadPath: $(Pipeline.Workspace)/cached-notice-branch
        continueOnError: true
        condition: and(succeeded(), ne(variables.CG_NOTICE_OK, 'true'))

      - task: DownloadBuildArtifacts@1
        displayName: "Cache: download last good NOTICE (main fallback)"
        inputs:
          buildType: specific
          project: $(System.TeamProject)
          definition: $(System.DefinitionId)
          buildVersionToDownload: latestFromBranch
          branchName: refs/heads/main
          allowPartiallySucceededBuilds: true
          artifactName: notice_output
          # See note on the same-branch download above: brace patterns match 0
          # files in DownloadBuildArtifacts@1. Keep one plain glob per line.
          itemPattern: |
            **/ThirdPartyNotices.generated.txt
            **/notice-meta.txt
          downloadPath: $(Pipeline.Workspace)/cached-notice-main
        continueOnError: true
        condition: and(succeeded(), ne(variables.CG_NOTICE_OK, 'true'), ne(variables['Build.SourceBranch'], 'refs/heads/main'))

      - script: |
          set -u
          GEN="$(Build.SourcesDirectory)/ThirdPartyNotices.generated.txt"
          BRANCH_CACHE="$(Pipeline.Workspace)/cached-notice-branch/notice_output/ThirdPartyNotices.generated.txt"
          BRANCH_META="$(Pipeline.Workspace)/cached-notice-branch/notice_output/notice-meta.txt"
          MAIN_CACHE="$(Pipeline.Workspace)/cached-notice-main/notice_output/ThirdPartyNotices.generated.txt"
          MAIN_META="$(Pipeline.Workspace)/cached-notice-main/notice_output/notice-meta.txt"

          # Emit what a cached NOTICE was built from, if we have the sidecar.
          # The sidecar is written by the upload step on every successful run.
          describe_cache() {
            local meta="$1"
            local label="$2"
            if [ -f "$meta" ]; then
              echo "##[warning]Cache source ($label):"
              while IFS= read -r line; do echo "##[warning]    $line"; done < "$meta"
            else
              echo "##[warning]Cache source ($label): no notice-meta.txt sidecar (built before this metadata was added)"
            fi
          }

          # Safety net: never overwrite a valid NOTICE. If CG produced a good
          # file, skip the fallback even if we were reached by mistake.
          if [ -f "$GEN" ] && [ "$(wc -c < "$GEN")" -gt 1024 ]; then
            echo "##[section]CG NOTICE generation succeeded; no fallback needed."
            echo "##vso[task.setvariable variable=NOTICE_FROM_CACHE]false"
            exit 0
          fi

          echo "##[warning]CG NOTICE generation failed or produced empty output."

          if [ -f "$BRANCH_CACHE" ] && [ "$(wc -c < "$BRANCH_CACHE")" -gt 1024 ]; then
            echo "##[warning]Falling back to cached NOTICE from same branch ($(Build.SourceBranch))."
            describe_cache "$BRANCH_META" "same-branch"
            cp "$BRANCH_CACHE" "$GEN"
            echo "##vso[task.setvariable variable=NOTICE_FROM_CACHE]branch"
            exit 0
          fi

          if [ -f "$MAIN_CACHE" ] && [ "$(wc -c < "$MAIN_CACHE")" -gt 1024 ]; then
            echo "##[warning]Falling back to cached NOTICE from main."
            echo "##[warning]Branch $(Build.SourceBranch) may have dependencies that differ from main; review the audit log."
            describe_cache "$MAIN_META" "main"
            cp "$MAIN_CACHE" "$GEN"
            echo "##vso[task.setvariable variable=NOTICE_FROM_CACHE]main"
            exit 0
          fi

          echo "##[warning]No cached NOTICE available from either source. Merge step will proceed with empty CG input; final NOTICE will rely entirely on the local scanner + cglicenses.json overrides."
          echo "##vso[task.setvariable variable=NOTICE_FROM_CACHE]none"
        displayName: "Cache: apply NOTICE fallback if CG failed"
        continueOnError: true
        condition: and(succeeded(), ne(variables.CG_NOTICE_OK, 'true'))

      - script: |
          set -u
          GEN="$(Build.SourcesDirectory)/ThirdPartyNotices.generated.txt"
          echo "=== CG NOTICE artifact ==="

          # Publish on both paths: fresh CG success AND carry-forward (re-publishing
          # a cached NOTICE so the chain survives a multi-build outage; see above).
          if [ ! -f "$GEN" ] || [ "$(wc -c < "$GEN")" -le 1024 ]; then
            echo "No usable ThirdPartyNotices.generated.txt to publish; skipping (no CG output and no cached fallback)."
            exit 0
          fi

          SIZE=$(wc -c < "$GEN")
          echo "Generated file size: $SIZE bytes (source: CG_NOTICE_OK=${CG_NOTICE_OK:-unset}, NOTICE_FROM_CACHE=${NOTICE_FROM_CACHE:-unset})"
          cp "$GEN" "$(Build.ArtifactStagingDirectory)/ThirdPartyNotices.generated.txt"
          echo "##vso[artifact.upload containerfolder=notice_output;artifactname=notice_output]$(Build.ArtifactStagingDirectory)/ThirdPartyNotices.generated.txt"

          # Sidecar for the next build's fallback. Fresh run records this build's
          # provenance; carry-forward preserves the original + appends a marker.
          META_OUT="$(Build.ArtifactStagingDirectory)/notice-meta.txt"
          if [ "${CG_NOTICE_OK:-}" = "true" ]; then
            {
              echo "built_at:          $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "source_branch:     $(Build.SourceBranch)"
              echo "source_commit:     $(Build.SourceVersion)"
              echo "build_id:          $(Build.BuildId)"
              echo "build_number:      $(Build.BuildNumber)"
              echo "size_bytes:        $SIZE"
            } > "$META_OUT"
          else
            case "${NOTICE_FROM_CACHE:-}" in
              branch) SRC_META="$(Pipeline.Workspace)/cached-notice-branch/notice_output/notice-meta.txt" ;;
              main)   SRC_META="$(Pipeline.Workspace)/cached-notice-main/notice_output/notice-meta.txt" ;;
              *)      SRC_META="" ;;
            esac
            if [ -n "$SRC_META" ] && [ -f "$SRC_META" ]; then
              cp "$SRC_META" "$META_OUT"
            else
              echo "original_provenance: unavailable (cached NOTICE predates the notice-meta.txt sidecar)" > "$META_OUT"
            fi
            {
              echo "carried_forward_by_build:    $(Build.BuildId)"
              echo "carried_forward_by_number:   $(Build.BuildNumber)"
              echo "carried_forward_at:          $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "carried_forward_reason:      CG NOTICE generation failed; re-published last-good NOTICE to keep the cache chain alive."
            } >> "$META_OUT"
          fi
          echo "##vso[artifact.upload containerfolder=notice_output;artifactname=notice_output]$META_OUT"
        displayName: "Upload CG NOTICE artifact (fresh or carried-forward)"
        condition: and(succeeded(), or(eq(variables.CG_NOTICE_OK, 'true'), in(variables.NOTICE_FROM_CACHE, 'branch', 'main')))
        continueOnError: true

      - script: |
          set -e
          npx tsc --skipLibCheck --module nodenext --moduleResolution nodenext --esModuleInterop --target es2022 --types node --outDir .oss-build-out build/azure-pipelines/oss/apply-overrides.ts build/azure-pipelines/oss/scan-licenses.ts build/azure-pipelines/oss/parse-notices.ts build/azure-pipelines/oss/merge-notices.ts
          node .oss-build-out/scan-licenses.js \
            --repo "$(Build.SourcesDirectory)" \
            --cg "$(Build.SourcesDirectory)/ThirdPartyNotices.generated.txt" \
            --output "$(Build.ArtifactStagingDirectory)/ThirdPartyNotices.extensions.txt"
          node .oss-build-out/merge-notices.js \
            --cg "$(Build.SourcesDirectory)/ThirdPartyNotices.generated.txt" \
            --extensions "$(Build.ArtifactStagingDirectory)/ThirdPartyNotices.extensions.txt" \
            --cglicenses "$(Build.SourcesDirectory)/cglicenses.json" \
            --output "$(Build.ArtifactStagingDirectory)/ThirdPartyNotices.new.txt" \
            --provenance

          # Upload all artifacts
          echo "##vso[artifact.upload containerfolder=notice_output;artifactname=notice_output]$(Build.ArtifactStagingDirectory)/ThirdPartyNotices.extensions.txt"
          echo "##vso[artifact.upload containerfolder=notice_output;artifactname=notice_output]$(Build.ArtifactStagingDirectory)/ThirdPartyNotices.new.txt"
        displayName: "Build merged NOTICE (scan extensions + merge into .new.txt)"
        continueOnError: true

      - task: AzureCLI@2
        displayName: Fetch secrets
        inputs:
          azureSubscription: vscode
          scriptType: pscore
          scriptLocation: inlineScript
          addSpnToEnvironment: true
          inlineScript: |
            Write-Host "##vso[task.setvariable variable=AZURE_TENANT_ID]$env:tenantId"
            Write-Host "##vso[task.setvariable variable=AZURE_CLIENT_ID]$env:servicePrincipalId"
            Write-Host "##vso[task.setvariable variable=AZURE_ID_TOKEN;issecret=true]$env:idToken"
        condition: and(succeeded(), eq(lower(variables['VSCODE_PUBLISH']), 'true'))

      - script: |
          set -e
          AZURE_STORAGE_ACCOUNT="vscodeweb" \
          AZURE_TENANT_ID="$(AZURE_TENANT_ID)" \
          AZURE_CLIENT_ID="$(AZURE_CLIENT_ID)" \
          AZURE_ID_TOKEN="$(AZURE_ID_TOKEN)" \
            node build/azure-pipelines/upload-sourcemaps.ts
        displayName: Upload sourcemaps to Azure
        condition: and(succeeded(), eq(lower(variables['VSCODE_PUBLISH']), 'true'))
