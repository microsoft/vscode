# Son of Anton — Backend Services
# Start all services: docker compose up -d
# Tear down everything: docker compose down -v

services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: soa-falkordb
    ports:
      - "${FALKORDB_PORT:-6379}:6379"
    volumes:
      - falkordb-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: soa-qdrant
    ports:
      - "${QDRANT_REST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  indexer:
    build:
      context: ./services/indexer
      dockerfile: Dockerfile
    container_name: soa-indexer
    depends_on:
      falkordb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      - FALKORDB_HOST=${FALKORDB_HOST:-falkordb}
      - FALKORDB_PORT=${FALKORDB_PORT:-6379}
      - QDRANT_HOST=${QDRANT_HOST:-qdrant}
      - QDRANT_REST_PORT=${QDRANT_REST_PORT:-6333}
      - QDRANT_GRPC_PORT=${QDRANT_GRPC_PORT:-6334}
      - PROJECT_PATH=${PROJECT_PATH:-/workspace}
      - LANGUAGES=${LANGUAGES:-typescript,python,rust,csharp,cpp}
    volumes:
      - ${PROJECT_PATH:-.}:/workspace:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  lsif:
    build:
      context: ./services/lsif
      dockerfile: Dockerfile
    container_name: soa-lsif
    depends_on:
      falkordb:
        condition: service_healthy
    environment:
      - FALKORDB_HOST=${FALKORDB_HOST:-falkordb}
      - FALKORDB_PORT=${FALKORDB_PORT:-6379}
      - PROJECT_PATH=${PROJECT_PATH:-/workspace}
      - LANGUAGES=${LANGUAGES:-typescript,python,rust,csharp,cpp}
      - PREFER_SCIP=${PREFER_SCIP:-false}
    volumes:
      - ${PROJECT_PATH:-.}:/workspace:ro
      - lsif-snapshots:/data/lsif-snapshots
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  mcp-gateway:
    build:
      context: ./services/mcp-gateway
      dockerfile: Dockerfile
    container_name: soa-mcp-gateway
    depends_on:
      falkordb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "${MCP_PORT:-3100}:3100"
    environment:
      - FALKORDB_HOST=${FALKORDB_HOST:-falkordb}
      - FALKORDB_PORT=${FALKORDB_PORT:-6379}
      - QDRANT_HOST=${QDRANT_HOST:-qdrant}
      - QDRANT_REST_PORT=${QDRANT_REST_PORT:-6333}
      - QDRANT_GRPC_PORT=${QDRANT_GRPC_PORT:-6334}
      - MCP_PORT=${MCP_PORT:-3100}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  mcp-database:
    build:
      context: ./son-of-anton-mcp/servers/database
      dockerfile: Dockerfile
    container_name: soa-mcp-database
    ports:
      - "${MCP_DATABASE_PORT:-3102}:3102"
    environment:
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-son_of_anton}
      - DB_USER=${DB_USER:-readonly}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - MCP_DATABASE_PORT=3102
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3102/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  mcp-deployment:
    build:
      context: ./son-of-anton-mcp/servers/deployment
      dockerfile: Dockerfile
    container_name: soa-mcp-deployment
    ports:
      - "${MCP_DEPLOYMENT_PORT:-3103}:3103"
    environment:
      - GITHUB_REPOSITORY=${GITHUB_REPOSITORY:-CodeHalwell/Son-Of-Anton}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - MCP_DEPLOYMENT_PORT=3103
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3103/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  mcp-tickets:
    build:
      context: ./son-of-anton-mcp/servers/tickets
      dockerfile: Dockerfile
    container_name: soa-mcp-tickets
    ports:
      - "${MCP_TICKETS_PORT:-3104}:3104"
    environment:
      - GITHUB_REPOSITORY=${GITHUB_REPOSITORY:-CodeHalwell/Son-Of-Anton}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - MCP_TICKETS_PORT=3104
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3104/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  owasp-zap:
    image: zaproxy/zap-stable:2.14.0
    container_name: soa-owasp-zap
    command: zap.sh -daemon -host 0.0.0.0 -port 8090 -config api.disablekey=true
    networks:
      - sandbox-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/JSON/core/view/version/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped

  penetration-tester:
    build:
      context: ./services/penetration-tester
      dockerfile: Dockerfile
    container_name: soa-penetration-tester
    depends_on:
      owasp-zap:
        condition: service_healthy
    ports:
      - "${PEN_TEST_PORT:-8092}:8092"
    environment:
      - PEN_TEST_PORT=${PEN_TEST_PORT:-8092}
      - ZAP_HOST=${ZAP_HOST:-owasp-zap}
      - ZAP_PORT=${ZAP_PORT:-8090}
      - TARGET_BASE_URL=${TARGET_BASE_URL:-http://localhost:3000}
      - FALKORDB_HOST=${FALKORDB_HOST:-falkordb}
      - FALKORDB_PORT=${FALKORDB_PORT:-6379}
      - MAX_REQUESTS_PER_TEST=${MAX_REQUESTS_PER_TEST:-100}
      - TEST_TIMEOUT_MS=${TEST_TIMEOUT_MS:-60000}
    networks:
      - sandbox-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8092/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  spec-pipeline:
    build:
      context: ./services/spec-pipeline
      dockerfile: Dockerfile
    container_name: soa-spec-pipeline
    ports:
      - "${SPEC_PIPELINE_PORT:-8090}:8090"
    environment:
      - SPEC_PIPELINE_PORT=${SPEC_PIPELINE_PORT:-8090}
      - SPECS_DIR=${SPECS_DIR:-.son-of-anton/specs}
    volumes:
      - ${PROJECT_PATH:-.}:/workspace:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  mcp-playwright:
    build:
      context: ./son-of-anton-mcp/servers/playwright
      dockerfile: Dockerfile
    container_name: soa-mcp-playwright
    ports:
      - "${MCP_PLAYWRIGHT_PORT:-3105}:3105"
    environment:
      - MCP_PLAYWRIGHT_PORT=3105
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-localhost,127.0.0.1}
    networks:
      - sandbox-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3105/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped

  background-tasks:
    build:
      context: ./services/background-tasks
      dockerfile: Dockerfile
    container_name: soa-background-tasks
    ports:
      - "${BACKGROUND_TASKS_PORT:-8093}:8093"
    environment:
      - BACKGROUND_TASKS_PORT=${BACKGROUND_TASKS_PORT:-8093}
      - STATE_DIR=/data/background
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MCP_GATEWAY_URL=http://mcp-gateway:3100
    volumes:
      - ${PROJECT_PATH:-.}:/workspace:rw
      - background-tasks-data:/data/background
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8093/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  visual-regression:
    build:
      context: ./services/visual-regression
      dockerfile: Dockerfile
    container_name: soa-visual-regression
    ports:
      - "${VISUAL_REGRESSION_PORT:-8094}:8094"
    environment:
      - VISUAL_REGRESSION_PORT=${VISUAL_REGRESSION_PORT:-8094}
      - BASELINES_DIR=/workspace/.son-of-anton/visual-baselines
      - DIFF_THRESHOLD=${DIFF_THRESHOLD:-0.01}
    volumes:
      - ${PROJECT_PATH:-.}:/workspace:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8094/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

networks:
  sandbox-net:
    driver: bridge

volumes:
  falkordb-data:
    driver: local
  qdrant-data:
    driver: local
  lsif-snapshots:
    driver: local
  background-tasks-data:
    driver: local
