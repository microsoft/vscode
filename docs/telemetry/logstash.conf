# test-workbench_change - new file
# Logstash 原始数据配置 - TSCode 遥测数据收集
# 目标：保存完整的原始数据，不做任何过滤和优化
# 用于分析和确定需要哪些字段

input {
  # ========================================
  # 输入源 1: HTTP 接口（1DS OneCollector 协议）
  # ========================================
  http {
    port => 8080
    codec => plain
    type => "tscode_telemetry_http"

    response_headers => {
      "Content-Type" => "application/json"
      "Access-Control-Allow-Origin" => "*"
      "Access-Control-Allow-Methods" => "POST, GET, OPTIONS"
      "Access-Control-Allow-Headers" => "Content-Type"
    }

    threads => 4
    max_content_length => 10485760
    tags => ["telemetry", "1ds", "raw"]
  }

  # ========================================
  # 输入源 2: 健康检查端点
  # ========================================
  http {
    port => 8081
    type => "health_check"
    codec => plain
    threads => 1
  }
}

filter {
  # ========================================
  # 过滤器 1: 处理健康检查请求
  # ========================================
  if [type] == "health_check" {
    drop { }
  }

  # ========================================
  # 过滤器 2: NDJSON 拆分（仅 1DS 格式，message 字段可用时）
  #
  # 两种数据格式处理方式：
  #   A) 1DS NDJSON（tscode 框架）：每行一个 JSON，message 字段存在
  #      按换行拆分后逐条解析
  #   B) Application Insights JSON 数组（第三方插件发送）：
  #      Logstash 自动解析 JSON，字段已展开到 event 顶层
  #      message 为空，不做二次加工，直接上报
  # ========================================
  if [type] == "tscode_telemetry_http" {
    # message 存在时（1DS NDJSON），拆分多行 JSON
    if [message] and [message] != "" {
      ruby {
        code => '
          message = event.get("message").to_s.strip
          if !message.empty?
            lines = message.split(/\r?\n/).reject(&:empty?)
            event.set("ndjson_lines", lines)
            event.set("ndjson_count", lines.length)
          end
        '
      }

      if [ndjson_count] == 1 {
        json {
          source => "[ndjson_lines][0]"
          remove_field => ["ndjson_lines", "ndjson_count"]
        }
      }

      if [ndjson_count] and [ndjson_count] > 1 {
        split {
          field => "ndjson_lines"
        }
        json {
          source => "ndjson_lines"
          remove_field => ["ndjson_lines", "ndjson_count"]
        }
      }
    }

    # 移除 HTTP 元数据，保留所有业务数据
    # 这里移除tags，是因为AppInsights数据的 tags 对象和 Logstash 原生 tags 对象冲突
    # ES mapping 时因二者冲突，会将 tags 标记为 _tagsparsefailure
    mutate {
      remove_field => [
        "event",
        "message",
        "tags",
        "host",
        "url",
        "user_agent",
        "http",
        "headers",
        "@version"
      ]
    }
  }
}

output {
  # ========================================
  # 输出到 Elasticsearch 8.x - 原始数据索引
  # ========================================
  if [type] == "tscode_telemetry_http" {
    elasticsearch {
      hosts => ["${ES_HOSTS}"]
      user => "${ES_USER}"
      password => "${ES_PASSWORD}"
      # 不使用模板限制，让 Elasticsearch 自动映射所有字段
      manage_template => false
      index => "tscode-telemetry-raw-%{+YYYY.MM.dd}"
    }
  }
  # ========================================
  # 调试输出（可选）
  # ========================================
  if [type] == "tscode_telemetry_http" {
    stdout {
      codec => rubydebug {
        metadata => true
      }
    }
  }
}
