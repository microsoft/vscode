# test-workbench_change - new file
# Logstash 原始数据配置 - TSCode 遥测数据收集
# 目标：保存完整的原始数据，不做任何过滤和优化
# 用于分析和确定需要哪些字段

input {
  # ========================================
  # 输入源 1: HTTP 接口（1DS OneCollector 协议）
  # ========================================
  http {
    port => 8080
    codec => plain
    type => "tscode_telemetry_http"

    response_headers => {
      "Content-Type" => "application/json"
      "Access-Control-Allow-Origin" => "*"
      "Access-Control-Allow-Methods" => "POST, GET, OPTIONS"
      "Access-Control-Allow-Headers" => "Content-Type"
    }

    threads => 4
    max_content_length => 10485760
    tags => ["telemetry", "1ds", "raw"]
  }

  # ========================================
  # 输入源 2: 健康检查端点
  # ========================================
  http {
    port => 8081
    type => "health_check"
    codec => plain
    threads => 1
  }
}

filter {
  # ========================================
  # 过滤器 1: 处理健康检查请求
  # ========================================
  if [type] == "health_check" {
    drop { }
  }

  # ========================================
  # 过滤器 2: 格式识别 + 拆分
  #
  # 支持两种格式：
  #   A) 1DS NDJSON（tscode 框架）：每行一个 JSON，name 带 "monacoworkbench/" 前缀
  #   B) Application Insights JSON 数组（第三方插件通过 @vscode/extension-telemetry 非1DS路径发送）
  #      body 为 JSON 数组 [{name, time, iKey, tags, data:{baseType, baseData:{ver,name,properties,measurements}}}]
  # ========================================
  if [type] == "tscode_telemetry_http" {
    ruby {
      code => '
        require "json"

        message = event.get("[event][original]") || event.get("message") || event.get("[http][request][body][content]") || ""
        message = message.to_s.strip

        if message.empty?
          event.tag("_no_data_to_split")
          next
        end

        # ── 尝试解析为 JSON，成功且为数组则走 Application Insights 路径 ──
        # 也处理单个对象的情况（包裹成数组）
        parsed = nil
        begin
          parsed = JSON.parse(message)
          parsed = [parsed] if parsed.is_a?(Hash)
        rescue
          parsed = nil
        end

        if parsed.is_a?(Array)
          begin
            ai_events = parsed
            ndjson_lines = []

            ai_events.each do |ai|
              next unless ai.is_a?(Hash)

              base_data = (ai.dig("data", "baseData") || {})

              # 提取事件名：优先 data.baseData.name，回退顶层 name
              raw_name = base_data["name"] || ai["name"] || "unknown"
              # 去掉 "Microsoft.ApplicationInsights." 前缀，统一加 "extension/" 前缀
              event_name = raw_name
                .sub(/^Microsoft\.ApplicationInsights\./, "")
                .sub(/^extension\//, "")
              prefixed_name = "extension/" + event_name

              properties   = base_data["properties"]   || {}
              measurements = base_data["measurements"] || {}

              # 将 AppInsights tags 合并进 properties
              (ai["tags"] || {}).each do |k, v|
                case k
                when "ai.session.id"        then properties["sessionID"]              = v.to_s
                when "ai.user.id",
                     "ai.user.authUserId"   then properties["common.vscodemachineid"] = v.to_s
                when "ai.application.ver"   then properties["version"]                = v.to_s
                when "ai.cloud.role"        then properties["common.extname"]         = v.to_s
                else
                  properties["tag_" + k.gsub(".", "_")] = v.to_s
                end
              end

              # 标记来源，方便 Kibana 区分
              properties["telemetry_source"] = "appinsights"

              # 将原始 tags 对象保存到独立字段，避免与 Logstash 内置 tags 数组冲突（_tagsparsefailure）
              if ai["tags"] && !ai["tags"].empty?
                properties["_ai_tags"] = ai["tags"].map { |k, v| "#{k}=#{v}" }.join("|")
              end

              one_ds = {
                "name" => prefixed_name,
                "time" => ai["time"] || Time.now.utc.strftime("%Y-%m-%dT%H:%M:%S.%3NZ"),
                "iKey" => ai["iKey"] || "o:extension-telemetry",
                "data" => {
                  "baseData" => {
                    "properties"   => properties,
                    "measurements" => measurements
                  }
                }
              }
              ndjson_lines << JSON.generate(one_ds)
            end

            event.set("ndjson_lines", ndjson_lines)
            event.set("ndjson_count", ndjson_lines.length)
            event.tag("appinsights_converted")
          rescue => e
            event.tag("_appinsights_parse_error")
            event.set("parse_error", e.message)
          end

        else
          # ── 1DS NDJSON 格式，按换行拆分 ──
          lines = message.split(/\r?\n/).reject(&:empty?)
          event.set("ndjson_lines", lines)
          event.set("ndjson_count", lines.length)
        end
      '
    }

    if [ndjson_count] == 1 {
      json {
        source => "[ndjson_lines][0]"
        remove_field => ["ndjson_lines", "ndjson_count"]
      }
    }

    if [ndjson_count] and [ndjson_count] > 1 {
      split {
        field => "ndjson_lines"
      }

      json {
        source => "ndjson_lines"
        remove_field => ["ndjson_lines", "ndjson_count"]
      }
    }

    # 只移除 HTTP 元数据，保留所有业务数据
    mutate {
      remove_field => [
        "event",
        "message",
        "host",
        "url",
        "user_agent",
        "http"
      ]
    }

    # AppInsights 原始 tags 字段已在 Ruby 中转存到 properties._ai_tags
    # 这里清除顶层 tags 字段，消除 _tagsparsefailure 警告
    if "appinsights_converted" in [tags] {
      mutate {
        remove_field => ["tags"]
      }
    }
  }
}

output {
  # ========================================
  # 输出到 Elasticsearch 8.x - 原始数据索引
  # ========================================
  if [type] == "tscode_telemetry_http" {
    elasticsearch {








      hosts => ["${ES_HOSTS}"]
      user => "${ES_USER}"
      password => "${ES_PASSWORD}"
      # 不使用模板限制，让 Elasticsearch 自动映射所有字段
      manage_template => false
      index => "tscode-telemetry-raw-%{+YYYY.MM.dd}"
    }
  }

  # ========================================
  # 调试输出（可选）
  # ========================================
  # if [type] == "tscode_telemetry_http" {
  #   stdout {
  #     codec => rubydebug {
  #       metadata => true
  #     }
  #   }
  # }
}
