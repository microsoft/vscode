# Logstash 配置文件 - VS Code 遥测日志分析（支持 HTTP 输入）
# 用于 ELK Stack 7.x 中的数据处理和分析
# 支持 1000+ 用户的内网部署场景

input {
  # ========================================
  # 输入源 2: HTTP 接口（新增 - 模拟 1DS OneCollector）
  # ========================================
  # 接收 VS Code 直接发送的遥测数据
  # 端点: http://your-server:8080/OneCollector/1.0
  # 注意：批量事件（NDJSON）只会处理第一个事件，这是 Logstash HTTP input 的限制
  http {
    port => 8080
    codec => json
    type => "vscode_telemetry_http"

    # 响应配置
    response_headers => {
      "Content-Type" => "application/json"
      "Access-Control-Allow-Origin" => "*"
      "Access-Control-Allow-Methods" => "POST, GET, OPTIONS"
      "Access-Control-Allow-Headers" => "Content-Type"
    }

    # 线程配置（1000 用户建议 4-8 个线程）
    threads => 4

    # 最大内容长度（10MB，足够大的遥测事件）
    max_content_length => 10485760

    # 额外的 HTTP 头
    additional_codecs => {
      "application/json" => "json"
      "application/x-json-stream" => "json"
    }

    # 标签
    tags => ["http_input", "telemetry", "1ds"]
  }

  # ========================================
  # 输入源 3: 健康检查端点（新增）
  # ========================================
  # 用于监控 Logstash 服务状态
  # 端点: http://your-server:8081/ping
  http {
    port => 8081
    type => "health_check"
    codec => plain
    tags => ["health"]
    threads => 1
  }

  # 可选：从 Beats 接收实时日志
  # beats {
  #   port => 5044
  #   type => "vscode_telemetry_beats"
  # }
}

filter {
  # ========================================
  # 过滤器 1: 处理健康检查请求
  # ========================================
  if [type] == "health_check" {
    # 健康检查请求直接丢弃，不存储
    drop { }
  }

  # ========================================
  # 过滤器 2: 处理 HTTP 输入的遥测数据（1DS 格式）
  # ========================================
  if [type] == "vscode_telemetry_http" {
    # 1DS 格式数据已经是 JSON，直接提取字段

    # 提取事件名称
    if [name] {
      mutate {
        add_field => { "event_name" => "%{name}" }
      }
      mutate {
        gsub => ["event_name", "^monacoworkbench/", ""]
        add_field => { "event_type" => "%{event_name}" }
      }
    }

    # 提取时间戳
    if [time] {
      date {
        match => ["time", "ISO8601"]
        target => "@timestamp"
        timezone => "Asia/Shanghai"
      }
    }

    # 提取 instrumentation key
    if [iKey] {
      mutate {
        add_field => { "instrumentation_key" => "%{iKey}" }
      }
    }

    # 提取 baseData 中的数据
    if [data][baseData] {
      # 将 properties 和 measurements 提升到 telemetry 字段
      ruby {
        code => "
          base_data = event.get('[data][baseData]')
          if base_data
            telemetry = {}
            telemetry['properties'] = base_data['properties'] if base_data['properties']
            telemetry['measurements'] = base_data['measurements'] if base_data['measurements']
            event.set('telemetry', telemetry)
          end
        "
      }
    }

    # 添加标签
    mutate {
      add_tag => ["http_telemetry", "1ds_format"]
    }
  }

  # ========================================
  # 过滤器 3: 处理文件输入的遥测数据（原有格式）
  # ========================================
  if [type] == "vscode_telemetry_file" {
    # 解析日志行的时间戳和事件名称
    grok {
      match => {
        "message" => "^%{TIMESTAMP_ISO8601:log_timestamp} \[%{WORD:log_level}\] %{DATA:event_name} %{GREEDYDATA:json_payload}$"
      }
    }

    # 解析 JSON 负载
    if [json_payload] {
      json {
        source => "json_payload"
        target => "telemetry"
        remove_field => ["json_payload"]
      }
    }

    # 将日志时间戳转换为 Elasticsearch 时间戳
    if [log_timestamp] {
      date {
        match => ["log_timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS"]
        target => "@timestamp"
        timezone => "Asia/Shanghai"
      }
    }

    # 提取事件类型
    if [event_name] {
      mutate {
        gsub => ["event_name", "^telemetry/", ""]
        add_field => { "event_type" => "%{event_name}" }
      }
    }

    # 添加标签
    mutate {
      add_tag => ["file_telemetry"]
    }
  }

  # ========================================
  # 过滤器 4: 通用字段提取（对所有遥测数据适用）
  # ========================================
  if [type] =~ /^vscode_telemetry/ {
    # 提取通用属性到顶层字段
    if [telemetry][properties] {
      # 用户和会话标识
      if [telemetry][properties][common.machineId] {
        mutate {
          add_field => { "machine_id" => "%{[telemetry][properties][common.machineId]}" }
        }
      }
      if [telemetry][properties][sessionID] {
        mutate {
          add_field => { "session_id" => "%{[telemetry][properties][sessionID]}" }
        }
      }
      if [telemetry][properties][common.devDeviceId] {
        mutate {
          add_field => { "device_id" => "%{[telemetry][properties][common.devDeviceId]}" }
        }
      }

      # 版本信息
      if [telemetry][properties][version] {
        mutate {
          add_field => { "vscode_version" => "%{[telemetry][properties][version]}" }
        }
      }
      if [telemetry][properties][commitHash] {
        mutate {
          add_field => { "commit_hash" => "%{[telemetry][properties][commitHash]}" }
        }
      }

      # 平台信息
      if [telemetry][properties][common.platform] {
        mutate {
          add_field => { "platform" => "%{[telemetry][properties][common.platform]}" }
        }
      }
      if [telemetry][properties][common.nodeArch] {
        mutate {
          add_field => { "node_arch" => "%{[telemetry][properties][common.nodeArch]}" }
        }
      }
    }

    # 提取测量数据
    if [telemetry][measurements] {
      # 会话时间
      if [telemetry][measurements][common.timesincesessionstart] {
        mutate {
          add_field => { "time_since_session_start" => "%{[telemetry][measurements][common.timesincesessionstart]}" }
          convert => { "time_since_session_start" => "integer" }
        }
      }

      # 事件序列号
      if [telemetry][measurements][common.sequence] {
        mutate {
          add_field => { "event_sequence" => "%{[telemetry][measurements][common.sequence]}" }
          convert => { "event_sequence" => "integer" }
        }
      }
    }

    # 处理特定事件类型

    # 工作区加载事件
    if [event_type] == "workspaceLoad" {
      if [telemetry][properties][theme] {
        mutate { add_field => { "theme" => "%{[telemetry][properties][theme]}" } }
      }
      if [telemetry][properties][language] {
        mutate { add_field => { "ui_language" => "%{[telemetry][properties][language]}" } }
      }
    }

    # 扩展激活事件
    if [event_type] == "activatePlugin" or [event_type] == "extensionActivationTimes" {
      if [telemetry][properties][id] {
        mutate { add_field => { "extension_id" => "%{[telemetry][properties][id]}" } }
      }
      if [telemetry][properties][name] {
        mutate { add_field => { "extension_name" => "%{[telemetry][properties][name]}" } }
      }
      if [telemetry][measurements][activateCallTime] {
        mutate {
          add_field => { "activation_time_ms" => "%{[telemetry][measurements][activateCallTime]}" }
          convert => { "activation_time_ms" => "float" }
        }
      }
    }

    # 错误事件
    if [event_type] == "UnhandledError" {
      if [telemetry][properties][msg] {
        mutate { add_field => { "error_message" => "%{[telemetry][properties][msg]}" } }
      }
      mutate { add_tag => ["error"] }
    }

    # 添加事件分类标签
    if [event_type] =~ /^workbench/ {
      mutate { add_tag => ["workbench", "ui"] }
    } else if [event_type] =~ /^editor/ {
      mutate { add_tag => ["editor"] }
    } else if [event_type] =~ /^extension/ or [event_type] =~ /^Extension:/ or [event_type] == "activatePlugin" {
      mutate { add_tag => ["extension"] }
    } else if [event_type] =~ /^workspace/ {
      mutate { add_tag => ["workspace"] }
    }
  }
}

output {
  # ========================================
  # 输出到 Elasticsearch 8.x
  # ========================================
  if [type] =~ /^vscode_telemetry/ {
    elasticsearch {
      hosts => ["${ES_HOSTS}"]
      user => "${ES_USER}"
      password => "${ES_PASSWORD}"
      index => "tscode-telemetry-%{+YYYY.MM.dd}"

      # 模板设置
      manage_template => true
      template_name => "tscode-telemetry"
      template_overwrite => true
    }
  }

  # ========================================
  # 调试输出 - 打印原始数据到容器日志（已启用）
  # ========================================
  if [type] == "vscode_telemetry_http" {
    stdout {
      codec => rubydebug {
        metadata => true
      }
    }
  }

  # ========================================
  # 可选：输出到文件（用于备份或离线分析）
  # ========================================
  # if [type] =~ /^vscode_telemetry/ {
  #   file {
  #     path => "/var/log/logstash/vscode-telemetry-%{+YYYY-MM-dd}.log"
  #     codec => json_lines
  #   }
  # }
}
