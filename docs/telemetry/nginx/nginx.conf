worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /usr/local/openresty/nginx/conf/mime.types; # test-workbench_change
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /dev/stdout main; # test-workbench_change
    error_log  /dev/stderr warn; # test-workbench_change

    # ============================================================
    # 后端地址配置
    # 将 ELK_SERVER_IP 替换为实际的 ELK 服务器 IP 地址
    # ============================================================
    upstream logstash_telemetry {
        server logstash:8080;
    }

    upstream logstash_health {
        server logstash:8081;
    }

    upstream kibana_backend {
        server kibana:5601;
    }

    # ============================================================
    # 遥测数据接收端点（VS Code 指向此处）
    # 转发到 ELK 服务器上的 Logstash :8080
    # ============================================================
    server {
        listen 8080;
        server_name _;

        client_max_body_size 20m;
        large_client_header_buffers 4 32k;

        location / {
            proxy_pass         http://logstash_telemetry;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            # 不要强制修改 Content-Type，保留原始请求头
            # proxy_set_header   Content-Type     application/x-ndjson;
            proxy_read_timeout 30s;

            # 确保请求体被完整转发
            proxy_request_buffering off;
        }
    }

    # ============================================================
    # 健康检查端点（VS Code 启动时检测）
    # 转发到 ELK 服务器上的 Logstash :8081
    # ============================================================
    server {
        listen 8081;
        server_name _;

        location / {
            proxy_pass         http://logstash_health;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_read_timeout 10s;
        }
    }

    # ============================================================
    # Kibana 访问入口
    # 转发到 ELK 服务器上的 Kibana :5601
    # ============================================================
    server {
        listen 80;
        server_name _;

        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;

        # 支持 Kibana WebSocket（实时推送）
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        location / {
            proxy_pass        http://kibana_backend;
            proxy_set_header  Host              $host;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }
    }
}
