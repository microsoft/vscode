services:
  nginx:
    image: openresty/openresty:alpine
    container_name: nginx
    volumes:
      - ./nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro # test-workbench_change
      - ./split_ndjson.lua:/usr/local/openresty/nginx/conf/split_ndjson.lua:ro # test-workbench_change
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8088:80"    # Kibana 访问入口
      - "8070:8080"  # 遥测数据接收（VS Code 指向此端口）
      - "8071:8081"  # 健康检查端点
    networks:
      - elk_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8081 2>&1; exit 0"] # test-workbench_change
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  elk_network:
    external: true
    name: telemetry_elk
