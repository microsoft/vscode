# Upstream-sync CI for the stokd-ide thin-patch fork.
#
# The real risk to this fork is INTERFACE DRIFT in the upstream services the
# agent-tabs model consumes (ITerminalGroupService / ITerminalChatService), which
# surfaces as a compile error — not a silent merge conflict. This workflow rebases
# the patch stack onto the latest one or two upstream release tags and runs the
# fast checks (seam guard + DOM-free model test) plus an optional full compile.
#
# Governing contract: AX-TERMINAL-AGENT-TABS. See docs/REBASE_RUNBOOK.md.

name: upstream-sync

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Upstream release tag to rebase onto (blank = latest stable)"
        required: false
        default: ""
  schedule:
    # Weekly, Monday 08:00 UTC — aligned to VS Code's release cadence.
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  rebase-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout patch branch (full history)
        uses: actions/checkout@v4
        with:
          ref: feat/agent-terminal-selector
          fetch-depth: 0

      - name: Wire upstream + fetch tags
        run: |
          git config user.email "ci@stokd.cloud"
          git config user.name "stokd-ide CI"
          git remote add upstream https://github.com/microsoft/vscode.git || true
          git fetch --tags upstream

      - name: Resolve target tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(git -c versionsort.suffix=- for-each-ref \
              --sort=-version:refname --format='%(refname:short)' \
              'refs/tags/[0-9]*.[0-9]*.[0-9]*' | head -1)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Rebasing onto upstream tag: $TAG"

      - name: Replay patch stack onto tag
        run: |
          git checkout -B ci-rebase
          BASE=$(git merge-base ci-rebase upstream/main || git rev-list --max-parents=0 HEAD | tail -1)
          # Only the seam commit may conflict; new-file commits replay cleanly.
          git rebase --onto "${{ steps.tag.outputs.tag }}" "$BASE" ci-rebase

      - name: Seam guard (no build needed)
        run: bash scripts/verify-seam.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: DOM-free model unit test (no build needed)
        run: |
          npm i -g tsx >/dev/null 2>&1 || true
          node --import tsx --test \
            src/vs/workbench/contrib/terminal/browser/agentTabs/test/agentTerminalSelectorModel.test.ts

      - name: Full compile (interface-drift canary)
        continue-on-error: true
        run: |
          npm ci
          npm run compile
