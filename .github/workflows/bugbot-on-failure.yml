# Trigger Cursor Bugbot when CI fails on a PR.
# See getnodus/workflow for the reusable workflow and documentation.

name: Bugbot on CI Failure

on:
  workflow_run:
    workflows: ["chat-lib tests", "Component Fixtures"]
    types: [completed]

jobs:
  call:
    uses: getnodus/workflow/.github/workflows/bugbot-on-failure.yml@main
    secrets:
      BUGBOT_PAT: ${{ secrets.BUGBOT_PAT }}
