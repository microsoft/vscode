# GitHub Actions workflow for automated AI Studio releases.
#
# SETUP: Copy this file to .github/workflows/release-app.yml in the repo root.
#        Then add GH_TOKEN to your repository secrets (Settings → Secrets → Actions).
#
# USAGE: Push a tag matching 'app-v*' to trigger a release build.
#        Example: git tag app-v1.0.1 && git push origin app-v1.0.1

name: Release AI Studio

on:
  push:
    tags:
      - 'app-v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            app/frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install app dependencies
        working-directory: app
        run: npm install

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Build frontend
        working-directory: app/frontend
        run: npx vite build

      - name: Build Electron
        working-directory: app
        run: node scripts/build-electron.mjs

      - name: Package & Publish (Linux)
        if: matrix.platform == 'linux'
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --linux --publish always

      - name: Package & Publish (Windows)
        if: matrix.platform == 'win'
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Package & Publish (macOS)
        if: matrix.platform == 'mac'
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --mac --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-studio-${{ matrix.platform }}
          path: |
            app/dist/*.exe
            app/dist/*.dmg
            app/dist/*.AppImage
            app/dist/*.yml
            app/dist/*.yaml
          if-no-files-found: ignore
          retention-days: 30
