name: Auto Sync Fork

# Trigger schedule + manual run
on:
  schedule:
    - cron: "0 0 */2 * *"   # Runs every 2 days at midnight
  workflow_dispatch:        # Allows manual run anytime

permissions:
  contents: write           # Needed to push changes

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Fetch full history for proper merges

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/microsoft/vscode
          git fetch upstream

      - name: Merge upstream changes
        run: |
          git checkout main
          git merge upstream/main -m "Sync with upstream"
          
      - name: Push changes to fork
        run: |
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}