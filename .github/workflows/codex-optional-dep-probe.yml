# THROWAWAY diagnostic workflow — DO NOT MERGE.
#
# Investigates why `@openai/codex-linux-x64` (the ~293 MB native Codex binary,
# an *aliased* optional dep `npm:@openai/codex@<ver>-linux-x64`) is missing from
# the shared Linux node_modules cache built on the self-hosted 1ES pool.
#
# Established so far: plain `npm ci` (isolated AND full-repo) DOES install the
# binary on the pool. So the drop is NOT the install. This run adds an archive
# roundtrip probe (F) that runs the exact cache pack/unpack the cache-build uses
# (listNodeModules.ts -> tar/zstd create -> extract) to see if the binary is
# dropped there.
#
# Same probes on two runners for a same-commit A/B:
#   * self-hosted 1es-vscode-oss-ubuntu-22.04-x64 (the cache producer)
#   * github-hosted ubuntu-24.04                    (control)
#
# Safe: touches nothing shared, saves no cache, needs no secrets. Delete after use.

on:
  workflow_dispatch:
  push:
    branches:
      - codex-cache-debug

permissions: {}

jobs:
  self-hosted-linux:
    name: Probe (self-hosted 1ES ubuntu-22.04)
    runs-on: [ self-hosted, 1ES.Pool=1es-vscode-oss-ubuntu-22.04-x64, "JobId=codex-probe-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}" ]
    steps:
      - name: Checkout microsoft/vscode
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: E — Full-repo npm ci --ignore-scripts (install codex)
        run: |
          set +e
          echo "=== disk before ==="; df -h . | tail -2
          npm ci --ignore-scripts --no-audit --no-fund --loglevel=warn > /tmp/fullci.log 2>&1
          echo "=== npm ci exit: $? ==="
          echo "=== disk after ==="; df -h . | tail -2
          ls -la node_modules/@openai/ 2>/dev/null || echo "NO @openai dir"
          if [ -x node_modules/@openai/codex-linux-x64/vendor/x86_64-unknown-linux-musl/bin/codex ]; then
            echo ">>> INSTALL: CODEX BINARY PRESENT + EXECUTABLE"
            ls -la node_modules/@openai/codex-linux-x64/vendor/x86_64-unknown-linux-musl/bin/codex
          else
            echo ">>> INSTALL: CODEX BINARY MISSING"
          fi

      - name: F — Archive roundtrip (listNodeModules + tar/zstd) codex survival
        run: |
          set +e
          echo "=== run listNodeModules.ts (exact cache-build file list) ==="
          node build/azure-pipelines/common/listNodeModules.ts /tmp/nm_list.txt
          echo "listNodeModules exit: $?"
          echo "total files listed: $(wc -l < /tmp/nm_list.txt)"
          echo "=== codex-linux-x64 entries in the list ==="
          grep -c "codex-linux-x64" /tmp/nm_list.txt
          echo "=== is the codex BINARY specifically in the list? ==="
          grep -n "codex-linux-x64/vendor/x86_64-unknown-linux-musl/bin/codex" /tmp/nm_list.txt || echo ">>> BINARY NOT IN listNodeModules OUTPUT"
          echo "=== tar create (zstd -T0 -3) via --files-from, exactly like cache.sh ==="
          mkdir -p /tmp/nmcache
          tar --use-compress-program='zstd -T0 -3' -cf /tmp/nmcache/nm.tzst --files-from /tmp/nm_list.txt 2>/tmp/tar_create.err
          echo "tar create exit: $?"; echo "--- tar create stderr (head) ---"; head -8 /tmp/tar_create.err
          ls -la /tmp/nmcache/nm.tzst 2>/dev/null
          echo "=== tar extract to /tmp/extracted ==="
          mkdir -p /tmp/extracted && cd /tmp/extracted
          tar --use-compress-program='zstd -d -T0' -xf /tmp/nmcache/nm.tzst 2>/tmp/tar_extract.err
          echo "tar extract exit: $?"; echo "--- tar extract stderr (head) ---"; head -8 /tmp/tar_extract.err
          if [ -x /tmp/extracted/node_modules/@openai/codex-linux-x64/vendor/x86_64-unknown-linux-musl/bin/codex ]; then
            echo ">>> ARCHIVE ROUNDTRIP: CODEX BINARY SURVIVED"
            ls -la /tmp/extracted/node_modules/@openai/codex-linux-x64/vendor/x86_64-unknown-linux-musl/bin/codex
          else
            echo ">>> ARCHIVE ROUNDTRIP: CODEX BINARY LOST"
            find /tmp/extracted/node_modules/@openai -maxdepth 2 2>/dev/null || echo "no @openai in extracted"
          fi

  github-hosted-linux:
    name: Probe (github-hosted ubuntu-24.04 control)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout microsoft/vscode
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: E — Full-repo npm ci --ignore-scripts (install codex)
        run: |
          set +e
          echo "=== disk before ==="; df -h . | tail -2
          npm ci --ignore-scripts --no-audit --no-fund --loglevel=warn > /tmp/fullci.log 2>&1
          echo "=== npm ci exit: $? ==="
          echo "=== disk after ==="; df -h . | tail -2
          ls -la node_modules/@openai/ 2>/dev/null || echo "NO @openai dir"
          if [ -x node_modules/@openai/codex-linux-x64/vendor/x86_64-unknown-linux-musl/bin/codex ]; then
            echo ">>> INSTALL: CODEX BINARY PRESENT + EXECUTABLE"
            ls -la node_modules/@openai/codex-linux-x64/vendor/x86_64-unknown-linux-musl/bin/codex
          else
            echo ">>> INSTALL: CODEX BINARY MISSING"
          fi

      - name: F — Archive roundtrip (listNodeModules + tar/zstd) codex survival
        run: |
          set +e
          echo "=== run listNodeModules.ts (exact cache-build file list) ==="
          node build/azure-pipelines/common/listNodeModules.ts /tmp/nm_list.txt
          echo "listNodeModules exit: $?"
          echo "total files listed: $(wc -l < /tmp/nm_list.txt)"
          echo "=== codex-linux-x64 entries in the list ==="
          grep -c "codex-linux-x64" /tmp/nm_list.txt
          echo "=== is the codex BINARY specifically in the list? ==="
          grep -n "codex-linux-x64/vendor/x86_64-unknown-linux-musl/bin/codex" /tmp/nm_list.txt || echo ">>> BINARY NOT IN listNodeModules OUTPUT"
          echo "=== tar create (zstd -T0 -3) via --files-from, exactly like cache.sh ==="
          mkdir -p /tmp/nmcache
          tar --use-compress-program='zstd -T0 -3' -cf /tmp/nmcache/nm.tzst --files-from /tmp/nm_list.txt 2>/tmp/tar_create.err
          echo "tar create exit: $?"; echo "--- tar create stderr (head) ---"; head -8 /tmp/tar_create.err
          ls -la /tmp/nmcache/nm.tzst 2>/dev/null
          echo "=== tar extract to /tmp/extracted ==="
          mkdir -p /tmp/extracted && cd /tmp/extracted
          tar --use-compress-program='zstd -d -T0' -xf /tmp/nmcache/nm.tzst 2>/tmp/tar_extract.err
          echo "tar extract exit: $?"; echo "--- tar extract stderr (head) ---"; head -8 /tmp/tar_extract.err
          if [ -x /tmp/extracted/node_modules/@openai/codex-linux-x64/vendor/x86_64-unknown-linux-musl/bin/codex ]; then
            echo ">>> ARCHIVE ROUNDTRIP: CODEX BINARY SURVIVED"
            ls -la /tmp/extracted/node_modules/@openai/codex-linux-x64/vendor/x86_64-unknown-linux-musl/bin/codex
          else
            echo ">>> ARCHIVE ROUNDTRIP: CODEX BINARY LOST"
            find /tmp/extracted/node_modules/@openai -maxdepth 2 2>/dev/null || echo "no @openai in extracted"
          fi
