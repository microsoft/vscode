          fi
          echo "=== ci.log: codex / optional / skip / EBADPLATFORM / http fetch ==="
          grep -iE "codex|@openai|optional|skip|ebadplatform|notarget|reify|http fetch" ci.log | tail -150

      - name: D — Dump npm debug logs (always silly level)
        if: always()
