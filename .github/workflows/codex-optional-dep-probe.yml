          fi
          echo "=== ci.log: codex/optional/skip/ebadplatform lines ==="
          grep -iE "codex|@openai|optional|skip|ebadplatform|notarget" ci.log | tail -80

      - name: E — FAITHFUL repro (full-repo npm ci --ignore-scripts, silly)
        run: |
