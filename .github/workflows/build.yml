name: Son of Anton — Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VSCODE_QUALITY: 'oss'

jobs:
  compile:
    name: Compile & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential pkg-config libx11-dev libx11-xcb-dev libxkbfile-dev libnotify-bin libkrb5-dev

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Type check build scripts
        run: npm run typecheck
        working-directory: build

      - name: Compile & Hygiene
        run: npm exec -- npm-run-all2 -lp core-ci hygiene eslint valid-layers-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Son of Anton-specific package CI. The compile job above covers the VS Code
  # monolithic build; this matrix covers the three first-party SoA packages
  # that live alongside the fork:
  #
  #   - son-of-anton-core: shared agent + LLM engine (consumed by both the
  #     CLI and the IDE extension via its compiled `dist/`).
  #   - son-of-anton-cli: the `sota` CLI surface.
  #   - extensions/son-of-anton: the IDE extension.
  #
  # We deliberately keep these in their own job so a failure surfaces against
  # the right package rather than buried in the monolithic compile output.
  # No untrusted input ever reaches these run: blocks — all commands are
  # hardcoded against package directories controlled by this repo.
  sota-typecheck:
    name: Son of Anton — Cross-package Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install root dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build son-of-anton-core
        run: npm --prefix son-of-anton-core run build

      - name: Build son-of-anton-cli
        run: npm --prefix son-of-anton-cli run build

      - name: Typecheck extensions/son-of-anton
        run: npx tsc -p tsconfig.json --noEmit
        working-directory: extensions/son-of-anton

  # End-to-end smoke against the harness CLI. Runs the offline path (no live
  # LLM call) so the job stays free + deterministic. Covers: build, version
  # banner, tools list, traces export, MCP wiring, sota init bootstrap,
  # hooks runtime — the surfaces most likely to break silently on a refactor.
  sota-cli-smoke:
    name: Son of Anton — CLI Smoke
    needs: sota-typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install root dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run harness smoke (offline)
        run: bash scripts/harness-smoke.sh --no-live

  # Son of Anton agent-harness unit tests (extension test/* directory). The
  # core and CLI packages don't yet ship Mocha tests; once they do they
  # should be added as additional steps here. The extension tests run under
  # the VS Code test harness which needs a display server, so we use xvfb.
  sota-harness-tests:
    name: Son of Anton — Agent Harness Tests
    needs: sota-typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2

      - name: Install root dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build son-of-anton-core
        run: npm --prefix son-of-anton-core run build

      - name: Build extensions/son-of-anton
        run: npm --prefix extensions/son-of-anton run build

      - name: Run extension tests under xvfb
        run: xvfb-run --auto-servernum npm --prefix extensions/son-of-anton test

  # Son of Anton Rust workspace (H17 embedded code-graph). Lives under
  # `crates/` per Rust convention. Three crates: sota-codegraph-core
  # (logic), sota-codegraph-napi (Node bindings), sota-codegraph-cli
  # (clap CLI). The cargo invocations run from `crates/` because that's
  # where the workspace `Cargo.toml` lives. No untrusted input reaches
  # any of the run: blocks below — every command operates on this
  # repo's tracked files.
  sota-rust:
    name: Son of Anton — Rust Workspace (cargo build + test + clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('crates/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo build
        working-directory: crates
        run: cargo build --workspace --all-features

      - name: cargo test
        working-directory: crates
        # Skip tests gated on external infra (FalkorDB, fastembed model
        # download) — those are run manually with `cargo test --
        # --ignored` against a provisioned environment.
        run: cargo test --workspace --all-features

      - name: cargo clippy
        working-directory: crates
        run: cargo clippy --workspace --all-features -- -D warnings

  test-ubuntu:
    name: Unit Tests (Ubuntu)
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential pkg-config libx11-dev libx11-xcb-dev libxkbfile-dev libnotify-bin libkrb5-dev

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run unit tests
        run: ./scripts/test.sh

  test-macos:
    name: Unit Tests (macOS)
    needs: compile
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run unit tests
        run: ./scripts/test.sh

  docker-services:
    name: Docker Services Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build indexer image
        uses: docker/build-push-action@v6
        with:
          context: ./services/indexer
          push: false
          tags: soa-indexer:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build lsif image
        uses: docker/build-push-action@v6
        with:
          context: ./services/lsif
          push: false
          tags: soa-lsif:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build mcp-gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./services/mcp-gateway
          push: false
          tags: soa-mcp-gateway:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-integration:
    name: Docker Compose Integration
    needs: docker-services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --wait --wait-timeout 120

      - name: Verify all services are healthy
        run: |
          set -euo pipefail
          unhealthy_count="$(docker compose ps --format json | jq '[.[] | select(.Health != "healthy")] | length')"
          if [ "$unhealthy_count" -gt 0 ]; then
            echo "Found $unhealthy_count unhealthy services:"
            docker compose ps
            exit 1
          fi
          echo "All services healthy"

      - name: Test FalkorDB connectivity
        run: |
          docker compose exec -T falkordb redis-cli GRAPH.QUERY son-of-anton "RETURN 1"

      - name: Test Qdrant connectivity
        run: |
          curl -sf http://localhost:6333/readyz

      - name: Test MCP Gateway health
        run: |
          curl -sf http://localhost:3100/health

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  build-electron:
    name: Build Electron Binary
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential pkg-config libx11-dev libx11-xcb-dev libxkbfile-dev libnotify-bin libkrb5-dev libsecret-1-dev

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run compile

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: son-of-anton-linux-x64
          path: out/
          retention-days: 7
