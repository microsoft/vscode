version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "devcontainers" # https://containers.dev/guide/dependabot
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    allow:
      - dependency-name: "@vscode/component-explorer"
      - dependency-name: "@vscode/component-explorer-cli"
    groups:
      component-explorer:
        patterns:
          - "@vscode/component-explorer"
          - "@vscode/component-explorer-cli"
  - package-ecosystem: "npm"
    directory: "/build/vite"
    schedule:
      interval: "daily"
    allow:
      - dependency-name: "@vscode/component-explorer"
      - dependency-name: "@vscode/component-explorer-vite-plugin"
    groups:
      component-explorer:
        patterns:
          - "@vscode/component-explorer"
          - "@vscode/component-explorer-vite-plugin"
