<style>
	* { margin: 0; padding: 0; box-sizing: border-box; }
	body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
	.af-container { padding: 16px; }
	.af-header {
		display: flex;
		justify-content: space-between;
		align-items: center;
		margin-bottom: 12px;
	}
	.af-title {
		font-size: 13px;
		font-weight: 600;
		color: #8b949e;
		text-transform: uppercase;
		letter-spacing: 0.6px;
	}
	.af-live {
		font-size: 11px;
		color: #3fb950;
		display: flex;
		align-items: center;
		gap: 4px;
	}
	.af-live-dot {
		width: 6px;
		height: 6px;
		border-radius: 50%;
		background: #3fb950;
		animation: af-blink 2s ease-in-out infinite;
	}
	@keyframes af-blink {
		0%, 100% { opacity: 1; }
		50% { opacity: 0.3; }
	}
	.af-list {
		display: flex;
		flex-direction: column;
		gap: 1px;
		max-height: 340px;
		overflow-y: auto;
	}
	.af-list::-webkit-scrollbar { width: 4px; }
	.af-list::-webkit-scrollbar-track { background: transparent; }
	.af-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
	.af-item {
		display: flex;
		align-items: flex-start;
		gap: 10px;
		padding: 8px 10px;
		background: #161b22;
		border-radius: 4px;
		transition: background 0.12s ease;
	}
	.af-item:hover { background: #1c2128; }
	.af-item.critical-pulse { animation: af-critical 3s ease-in-out infinite; }
	@keyframes af-critical {
		0%, 100% { background: #161b22; }
		50% { background: rgba(248, 81, 73, 0.06); }
	}
	.af-time {
		font-size: 11px;
		font-family: 'SF Mono', 'Cascadia Code', monospace;
		color: #6e7681;
		white-space: nowrap;
		min-width: 38px;
		padding-top: 1px;
	}
	.af-service {
		font-size: 11px;
		color: #58a6ff;
		white-space: nowrap;
		min-width: 110px;
		padding-top: 1px;
	}
	.af-badge {
		font-size: 10px;
		font-weight: 700;
		padding: 1px 6px;
		border-radius: 3px;
		white-space: nowrap;
		text-transform: uppercase;
		letter-spacing: 0.3px;
		min-width: 60px;
		text-align: center;
	}
	.af-badge.critical { background: rgba(248, 81, 73, 0.2); color: #f85149; border: 1px solid rgba(248, 81, 73, 0.3); }
	.af-badge.warning { background: rgba(210, 153, 34, 0.2); color: #d29922; border: 1px solid rgba(210, 153, 34, 0.3); }
	.af-badge.info { background: rgba(88, 166, 255, 0.12); color: #58a6ff; border: 1px solid rgba(88, 166, 255, 0.2); }
	.af-message {
		font-size: 12px;
		color: #c9d1d9;
		flex: 1;
		line-height: 1.4;
	}
</style>

<div class="af-container">
	<div class="af-header">
		<span class="af-title">Alert Feed</span>
		<span class="af-live"><span class="af-live-dot"></span> Live</span>
	</div>
	<div class="af-list" id="af-list"></div>
</div>

<script>
window.phonon.onReady(function() {
	var alerts = [
		{ time: '10:47', service: 'auth-service', severity: 'critical', message: 'Connection pool at 95% capacity' },
		{ time: '10:42', service: 'api-gateway', severity: 'warning', message: 'Response time exceeded 500ms threshold' },
		{ time: '10:38', service: 'payment-api', severity: 'info', message: 'Autoscaling triggered \u2014 3\u21925 instances' },
		{ time: '10:31', service: 'recommendation-svc', severity: 'critical', message: 'OOM killed \u2014 restarting pod' },
		{ time: '10:28', service: 'auth-service', severity: 'warning', message: 'Token refresh rate anomaly detected' },
		{ time: '10:15', service: 'search-api', severity: 'info', message: 'Index rebuild completed (4m 22s)' },
		{ time: '09:58', service: 'notification-svc', severity: 'warning', message: 'Email delivery queue depth: 1,247' },
		{ time: '09:45', service: 'analytics-svc', severity: 'info', message: 'Daily aggregation job started' },
		{ time: '09:30', service: 'api-gateway', severity: 'warning', message: 'SSL certificate expires in 14 days' },
		{ time: '09:12', service: 'user-service', severity: 'info', message: 'Cache hit ratio dropped to 72%' }
	];

	var list = document.getElementById('af-list');
	for (var i = 0; i < alerts.length; i++) {
		var a = alerts[i];
		var item = document.createElement('div');
		item.className = 'af-item' + (a.severity === 'critical' ? ' critical-pulse' : '');

		var time = document.createElement('span');
		time.className = 'af-time';
		time.textContent = a.time;

		var service = document.createElement('span');
		service.className = 'af-service';
		service.textContent = a.service;

		var badge = document.createElement('span');
		badge.className = 'af-badge ' + a.severity;
		badge.textContent = a.severity;

		var message = document.createElement('span');
		message.className = 'af-message';
		message.textContent = a.message;

		item.appendChild(time);
		item.appendChild(service);
		item.appendChild(badge);
		item.appendChild(message);
		list.appendChild(item);
	}
});
</script>
